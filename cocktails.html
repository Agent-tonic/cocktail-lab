,"category":"The Brandy Base","page":500,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Cherry brandy","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"1½ tsp"},{"name":"Lemon juice","amount":"2 tsp"},{"name":"Grenadine","amount":"1½ tsp"}],"instructions":"Shake all the ingredients together with ice and strain into a sugar-rimmed glass. Drop in a cherry to garnish.","note":"Try dipping the rim of the glass in cherry brandy before you rim it with sugar."},{"id":"280","name":"Apricot Fizz","category":"The Brandy Base","page":502,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Apricot brandy","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Lime juice","amount":"juice of ½ lime"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake all the ingredients (except for the soda water) together with ice and strain into an ice-filled glass. Top with soda water. Place 5 slices of fresh apricot inside the glass to garnish.","note":"As an alternative, muddle 2 fresh apricots (pitted) together with the sugar in a shaker. Pour in 2 oz/56 ml regular brandy and add the lemon and lime. Shake, strain, top and garnish as before."},{"id":"281","name":"Royal Smile","category":"The Brandy Base","page":503,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Apricot brandy","amount":"1 tsp"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Sugar syrup","amount":"dash"},{"name":"Fresh raspberries","amount":"5"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. Place a tight lemon twist inside the glass to garnish.","note":"This brandy and gin mix works well with the sweet apricot and the fresh raspberries."},{"id":"282","name":"Apricot Flower","category":"The Brandy Base","page":504,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Fresh apricot (peeled and pitted)","amount":"1"},{"name":"Brandy","amount":"1¾ oz / 49 ml"},{"name":"Apricot brandy","amount":"1½ tsp"},{"name":"Sweet vermouth","amount":"¾ oz / 21 ml"},{"name":"Lemon juice","amount":"1½ tsp"}],"instructions":"Muddle the apricot in a shaker. Add the remaining ingredients, shake with ice and strain into the glass. Float an edible flower on the top of the drink to garnish.","note":"Try this cocktail with 2 or 3 drops of parfait amour instead of sweet vermouth, to turn this orange-coloured mix into a purple drink with a floral flavour."},{"id":"283","name":"After-Dinner Cocktail","category":"The Brandy Base","page":506,"glass":"Rocks","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Lime wedges","amount":"4"},{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Apricot brandy","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"1 oz / 28 ml"}],"instructions":"Squeeze the lime wedges over a shaker to release the juice and drop in the spent wedges. Add the remaining ingredients. Shake with ice and pour the mix (including the lime wedges) into the glass.","note":"This cocktail is perfect after a meal — the sour lime will cleanse your palate."},{"id":"284","name":"Apricot Special","category":"The Brandy Base","page":507,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Fresh apricot (peeled and pitted)","amount":"1"},{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Gin","amount":"¼ tsp"},{"name":"Light (single) cream","amount":"1 tbsp"}],"instructions":"Muddle the apricot in a shaker. Add the remaining ingredients and shake with ice. Strain the mix into the glass.","note":"The gin adds a hint of juniper flavour to this cocktail."},{"id":"285","name":"Ruby Dawn","category":"The Brandy Base","page":508,"glass":"Rocks","alcoholRating":1,"starRating":3,"ingredients":[{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Apricot brandy","amount":"½ oz / 14 ml"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"},{"name":"Grenadine","amount":"1 tsp"},{"name":"Apple juice","amount":"dash"}],"instructions":"Shake all of the ingredients together with ice, and strain into an ice-filled glass. To garnish, put 4 or 5 thin slices of apple into the drink.","note":"This sweet drink reminds me of late nights and early mornings in South Africa — watching the sun come up over the Indian Ocean. Bliss!"},{"id":"286","name":"Brandied Port","category":"The Brandy Base","page":510,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Port","amount":"1 oz / 28 ml"},{"name":"Maraschino","amount":"1 tsp"},{"name":"Lemon juice","amount":"juice of ¼ lemon"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Place a slice of orange inside the glass to garnish.","note":"I prefer to use tawny port. Regular port is bottled-aged, whereas tawny port is cask-aged for a minimum of 5 years. I think this perfectly complements the brandy in this rich-tasting cocktail."},{"id":"287","name":"Brandy Smash","category":"The Brandy Base","page":513,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Mint sprigs","amount":"4"},{"name":"Sugar cube (white)","amount":"1"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Soda water","amount":"to top"}],"instructions":"Muddle the mint together with the sugar in an old-fashioned glass. Pour in the brandy and add crushed ice. Top with soda water and stir.","note":"A smash is any short drink containing mint, sugar and a spirit, served in an old-fashioned glass over crushed ice."},{"id":"288","name":"Gimp","category":"The Brandy Base","page":515,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Grenadine","amount":"½ tsp"}],"instructions":"Shake the ingredients together with ice and strain into the glass.","note":"This is a simple, sweet-and-sour cocktail."},{"id":"289","name":"Brandy Daisy","category":"The Brandy Base","page":517,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Raspberry syrup","amount":"1 tsp"},{"name":"Superfine (caster) sugar","amount":"½ tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into an ice-filled glass. Garnish with 5 fresh raspberries.","note":"Try this cocktail with fresh raspberries as well as the syrup to enhance the fruit flavour, and to give the mix a slightly smoother consistency."},{"id":"290","name":"Brandy Cassis","category":"The Brandy Base","page":518,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Crème de cassis","amount":"dash"},{"name":"Lemon juice","amount":"1 oz / 28 ml"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Squeeze a lemon peel over the glass to release the fruit's oils into the drink, then drop the peel inside the glass to garnish.","note":"This is a sweet, berry-flavoured drink with a citrus tang."},{"id":"291","name":"Brandy Cobbler","category":"The Brandy Base","page":520,"glass":"Rocks","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"2 oz / 56 ml"},{"name":"Brandy","amount":"2 oz / 56 ml"}],"instructions":"Stir the sugar with the soda water in an old-fashioned glass until the sugar is dissolved. Fill the glass with crushed ice. Add the brandy and stir well. To garnish, drop 2 blackberries, 2 raspberries and 2 cranberries into the glass. Serve with straws.","note":"This cocktail is served with straws so that the drinker can use them to crush the berries — the more they crush, the more berry-flavoured the drink."},{"id":"292","name":"Gilroy","category":"The Brandy Base","page":521,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Dry vermouth","amount":"1 tbsp"},{"name":"Orange bitters","amount":"dash"},{"name":"Maraschino","amount":"dash"},{"name":"Lemon juice","amount":"juice of ¼ lemon"}],"instructions":"Shake all of the ingredients together with ice and strain into a martini glass. To garnish, put an orange peel inside the glass and drop in a cherry.","note":"You can also try a warm, stirred version of this cocktail. Pour the ingredients into a shaker and stir. Serve in a pre-warmed brandy snifter."},{"id":"293","name":"Widow's Kiss","category":"The Brandy Base","page":522,"glass":"Martini","alcoholRating":3,"starRating":2,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Bénédictine","amount":"½ oz / 14 ml"},{"name":"Chartreuse (yellow)","amount":"½ oz / 14 ml"},{"name":"Angostura bitters","amount":"dash"}],"instructions":"Shake the ingredients with ice and strain into the glass. Garnish with half a maraschino cherry inside a fresh (stalkless) cherry.","note":"In this cocktail the strong-tasting, high-proof Chartreuse is disguised by the sweet herbal-flavoured Bénédictine."},{"id":"294","name":"Morning Glory","category":"The Brandy Base","page":524,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"},{"name":"Pernod","amount":"½ tsp"},{"name":"Triple sec","amount":"¼ tsp"},{"name":"Orange bitters","amount":"2 dashes"},{"name":"Maraschino","amount":"¼ tsp"}],"instructions":"Pour all of the ingredients into a shaker, stir with ice and strain into the glass. Drop in a cherry to garnish.","note":"A strong, dry drink, with notes of liquorice and bitter orange."},{"id":"295","name":"Pineapple Spice","category":"The Brandy Base","page":525,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Fresh pineapple (skinned, cored)","amount":"½ cup"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"}],"instructions":"Muddle the pineapple together with the lemon and sugar in a shaker. Add the brandy and triple sec. Shake with ice and strain into the glass. To garnish, put a pineapple stick and a cinnamon stick inside the glass.","note":"The cinnamon garnish will temper the sweetness of the pineapple and add a spicy edge to this drink."},{"id":"296","name":"Grape Cooler","category":"The Brandy Base","page":527,"glass":"Rocks","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Green seedless grapes","amount":"7 (plus 2 for garnish)"},{"name":"Red seedless grapes","amount":"3 (plus 2 for garnish)"},{"name":"Superfine (caster) sugar","amount":"½ tsp"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Ginger ale","amount":"2 oz / 56 ml"}],"instructions":"Muddle the green and red grapes together with the sugar in a shaker. Pour in the brandy and shake with ice. Strain the mix into an ice-filled glass. Top with ginger ale and stir. Drop 2 green and 2 red grapes (halved) into the drink to garnish. Stir again.","note":"This cocktail is a variation on the Harvard Cooler, which was a popular drink at Harvard University in the early 1960s. The grapes enhance the flavour of the rich brandy, and the ginger adds a spicy and refreshing taste."},{"id":"297","name":"French Jam","category":"The Brandy Base","page":528,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Jamaica dark rum","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"½ tsp"},{"name":"Angostura bitters","amount":"dash"},{"name":"Pineapple juice","amount":"½ tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. Put a pineapple stick inside the glass to garnish.","note":"This cocktail makes a fine pre-dinner tipple."},{"id":"298","name":"Brandy Colonial","category":"The Brandy Base","page":529,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"},{"name":"Sweet vermouth","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"½ tsp"},{"name":"Pernod","amount":"¼ tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. To garnish, put a cucumber stick (including the peel) and a sprig of mint inside the glass.","note":"The skin should be left on the cucumber garnish, as the skin contains the flavour."},{"id":"299","name":"Saratoga","category":"The Brandy Base","page":531,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Angostura bitters","amount":"2 dashes"},{"name":"Maraschino","amount":"½ tsp"},{"name":"Lemon juice","amount":"1 tsp"},{"name":"Pineapple juice","amount":"1 tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. Place a pineapple leaf inside the glass to decorate.","note":"The dry bitters and the sharp lemon will balance the sweet pineapple and maraschino to create a semi-sweet mix."},{"id":"300","name":"Cuban Master","category":"The Brandy Base","page":532,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Havana Club rum","amount":"1 oz / 28 ml"},{"name":"Orange juice","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"1 oz / 28 ml"},{"name":"Pineapple juice","amount":"4 oz / 112 ml"},{"name":"Passion fruit syrup","amount":"1 oz / 28 ml"}],"instructions":"Pour all of the ingredients into an ice-filled shaker. Shake, and strain into a tall glass, garnishing with pieces of fresh pineapple, orange or passion fruit.","note":"This is a real slice of tropical paradise — orange, lime, pineapple, passion fruit — backed up with rum and brandy. You could add a touch of grenadine to the finished drink for that 'sunrise' look."},{"id":"301","name":"Georgia Peach Julep","category":"The Brandy Base","page":534,"glass":"Tall","alcoholRating":5,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Peach liqueur","amount":"1 oz / 28 ml"},{"name":"Mint leaves","amount":"8–10"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Put the mint, brandy and sugar syrup into a tall glass, add some crushed ice, and stir. Add more crushed ice and the peach liqueur, and stir again for up to a minute, to really release the mint flavour from the leaves. Top with more crushed ice and garnish with sprigs of mint.","note":"This is one of the original versions of the American Mint Julep. If you're using a really sweet peach liqueur like Archers, you may want to cut back the sugar syrup a touch."},{"id":"302","name":"Strawberry Sunrise","category":"Liqueurs / Other Spirits","page":538,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Strawberry liqueur","amount":"2 oz / 56 ml"},{"name":"Grenadine","amount":"½ oz / 14 ml"},{"name":"Fresh strawberries","amount":"4"},{"name":"Orange juice","amount":"to top"}],"instructions":"Blend the first 3 ingredients together with half a cup of crushed ice until smooth. Pour the mix into the glass and top with orange. Attach one whole strawberry to the rim of the glass to garnish.","note":"This is a refreshing, strawberry variation on the classic Tequila Sunrise (see no.116)."},{"id":"303","name":"Mani Masi","category":"Liqueurs / Other Spirits","page":541,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Fresh strawberries","amount":"4"},{"name":"Strawberry liqueur","amount":"1 oz / 28 ml"},{"name":"Vodka","amount":"¾ oz / 21 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"},{"name":"Sour mix","amount":"1 oz / 28 ml"}],"instructions":"Muddle the strawberries in a shaker. Pour in the remaining ingredients; shake with ice and strain into a sugar-rimmed, ice-filled glass. Place 3 slices of strawberry inside the glass to garnish.","note":"A fresh strawberry-flavoured cocktail to be drunk on hot summer's days. You can experiment with other fresh fruits and fruit liqueurs, such as melon or raspberry."},{"id":"304","name":"Apple Spice","category":"Liqueurs / Other Spirits","page":543,"glass":"Rocks/Shot","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Apple schnapps","amount":"2 oz / 56 ml"},{"name":"Cinnamon schnapps","amount":"splash"}],"instructions":"Pour the ingredients into a glass filled with ice and stir. Place 5 slices of apple and a cinnamon stick inside the glass to garnish.","note":"This drink can also be served as a layered shot: simply pour the apple schnapps into a shot glass and float the cinnamon schnapps on top."},{"id":"305","name":"Crocodile Cooler","category":"Liqueurs / Other Spirits","page":544,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Midori","amount":"1 oz / 28 ml"},{"name":"Citrus vodka","amount":"1 oz / 28 ml"},{"name":"Triple sec","amount":"¾ oz / 21 ml"},{"name":"Sour mix","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"½ oz / 14 ml"},{"name":"Lemonade","amount":"to top"}],"instructions":"Pour all of the ingredients (except for the lemonade) into a glass filled with ice. Top with lemonade. To garnish, place a pineapple wedge on the rim of the glass, and a cherry or lime wheel inside the glass.","note":"This cocktail should be a darker colour at the bottom and fainter near the top, like a crocodile lurking beneath the water's surface — watch out for the citrus bite!"},{"id":"306","name":"Pimm's Cup","category":"Liqueurs / Other Spirits","page":547,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Pimm's","amount":"2 oz / 56 ml"},{"name":"Gin","amount":"¼ oz / 7 ml"},{"name":"Lemonade and/or ginger ale","amount":"to top"}],"instructions":"Put mint leaves, slices of strawberry, lemon and orange, and a strip of cucumber peel into an ice-filled glass. Pour in the ingredients and stir.","note":"The fruity and refreshing Pimm's Cup is the quintessential English cocktail. The origins trace back to Mr James Pimm's Oyster Bar in 19th-century London."},{"id":"307","name":"Sex on the Beach","category":"Liqueurs / Other Spirits","page":549,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Peach schnapps","amount":"1 oz / 28 ml"},{"name":"Vodka","amount":"¾ oz / 21 ml"},{"name":"Cranberry juice","amount":"to top"},{"name":"Orange juice","amount":"to top"}],"instructions":"Pour the peach schnapps and the vodka into a sugar-rimmed glass filled with ice. Top with cranberry and orange juice. Garnish with an orange wheel and a wedge of lime.","note":"A popular modern classic. Its base, peach schnapps, is not technically a schnapps but a liqueur. The term was borrowed to help remarket liqueurs for a young audience in the late 1980s."},{"id":"308","name":"Twin Peach","category":"Liqueurs / Other Spirits","page":551,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Peach schnapps","amount":"2 oz / 56 ml"},{"name":"Cranberry juice","amount":"4 oz / 112 ml"},{"name":"Lychee syrup (canned)","amount":"2 oz / 56 ml"}],"instructions":"Shake the ingredients together with ice and strain into an ice-filled glass. Stir. Put 2 slices of peach and 2 lychees (canned) inside the glass to garnish.","note":"You can turn this afternoon cocktail into a longer, sparkling drink by adding a dash of lemonade."},{"id":"309","name":"Fuzzy Navel","category":"Liqueurs / Other Spirits","page":552,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Peach schnapps","amount":"1 oz / 28 ml"},{"name":"Vodka","amount":"¾ glass and sprinkle chocolate flakes on top of the drink.","note":"The unbeatable combination of strawberry, chocolate and cream makes this cocktail a delicious after-dinner treat."},{"id":"349","name":"Raspberry Cream","category":"Liqueurs / Other Spirits","page":617,"glass":"Rocks","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Kahlúa","amount":"¾ oz / 21 ml"},{"name":"Crème de framboise","amount":"¾ oz / 21 ml"},{"name":"Baileys","amount":"1 oz / 28 ml"},{"name":"Soda water","amount":"to fill"}],"instructions":"Pour the first 3 ingredients, in order, into a glass filled with ice. Fill with soda water and stir. Drop 2 fresh raspberries into the drink to garnish.","note":"Not many cocktails mix cream liqueur with soda water because the ingredients will usually separate. However, in this cocktail the other liqueurs act as combining agents."},{"id":"350","name":"Peppermint Twist","category":"Liqueurs / Other Spirits","page":619,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Crème de menthe (white)","amount":"1½ oz / 42 ml"},{"name":"Crème de cacao (white)","amount":"½ oz / 14 ml"},{"name":"Vanilla ice cream","amount":"3 scoops"}],"instructions":"Blend the ingredients together with half a cup of crushed ice until smooth. Pour the mix into the glass. To garnish, crush a chocolate-covered peppermint candy stick and sprinkle on top of the drink.","note":"This minty cocktail is a dessert in itself."},{"id":"351","name":"B-52","category":"Liqueurs / Other Spirits","page":620,"glass":"Shot","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Kahlúa","amount":"equal parts"},{"name":"Baileys","amount":"equal parts"},{"name":"Grand Marnier","amount":"equal parts"}],"instructions":"Layer the drink by pouring the ingredients, in order, into a shot glass.","note":"This is the original way to make a B-52. You can replace the Grand Marnier with heavy (double) cream, or a light liqueur, such as peppermint, if you wish."},{"id":"352","name":"Blackjack","category":"Liqueurs / Other Spirits","page":622,"glass":"Rocks","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Black sambuca","amount":"½ oz / 14 ml"},{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Espresso (hot)","amount":"1"}],"instructions":"Shake the ingredients together with ice and strain into an ice-filled glass.","note":"Sambuca is a liquorice-flavoured liqueur, produced by infusing alcohol with elderberries and anise. The ice will temper the strong-tasting alcohol."},{"id":"353","name":"Toasted Almond","category":"Liqueurs / Other Spirits","page":624,"glass":"Rocks/Martini","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Kahlúa","amount":"1½ oz / 42 ml"},{"name":"Amaretto","amount":"1 oz / 28 ml"},{"name":"Milk","amount":"1½ oz / 42 ml"}],"instructions":"Pour the ingredients into a glass filled with ice and stir. Sprinkle toasted almonds (crushed) on top of the drink to garnish.","note":"To create a smoother and richer-tasting version of this drink, use light (single) cream instead of milk."},{"id":"354","name":"Mint Iced Coffee","category":"Liqueurs / Other Spirits","page":627,"glass":"Rocks","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Crème de cacao (white)","amount":"1 oz / 28 ml"},{"name":"Crème de menthe (white)","amount":"1 oz / 28 ml"},{"name":"Brandy","amount":"¾ oz / 21 ml"},{"name":"Triple espresso (cooled)","amount":"1"}],"instructions":"Shake all of the ingredients together with ice and pour into the glass. Stir. Place a tight lemon twist inside the glass to garnish.","note":"If you like iced coffee, you'll love this cocktail."},{"id":"355","name":"Absinthe Special","category":"Liqueurs / Other Spirits","page":629,"glass":"Rocks","alcoholRating":5,"starRating":4,"ingredients":[{"name":"Absinthe","amount":"1½ oz / 42 ml"},{"name":"Superfine sugar","amount":"1 tsp"},{"name":"Cold water","amount":"1 oz / 28 ml"}],"instructions":"Pour the absinthe into the glass. Place the sugar on a bar spoon, dip into the glass to soak with absinthe. Set light to the sugar. Burn until bubbling and caramelizing. Place the spoon inside the glass and stir the burning sugar with the absinthe. Slowly pour in the water until the flame goes out.","note":"Beware: the glass will be hot!"},{"id":"356","name":"Vya Fashion","category":"Liqueurs / Other Spirits","page":630,"glass":"Rocks","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Sugar cube (white)","amount":"1"},{"name":"Angostura bitters","amount":"2 drops"},{"name":"Orange peel","amount":"1"},{"name":"Vya extra-dry vermouth","amount":"1 oz / 28 ml"},{"name":"Vya sweet vermouth","amount":"1 oz / 28 ml"}],"instructions":"Place the sugar cube in an old-fashioned glass and pour the bitters onto the cube. Add the orange peel and a dash each of the two vermouths. Muddle the ingredients. Stir the mix, slowly pour in the remaining vermouth. Continue to stir and add ice until the glass is frosted and filled with ice.","note":"A Vya vermouth version of the Old-fashioned. Vya is a fruity and delicate Californian vermouth."},{"id":"357","name":"Rocky Mezzanine","category":"Liqueurs / Other Spirits","page":631,"glass":"Rocks","alcoholRating":3,"starRating":2,"ingredients":[{"name":"Maraschino","amount":"1 tbsp"},{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Light rum","amount":"½ oz / 14 ml"}],"instructions":"Layer the drink by pouring the ingredients, in order, into a glass filled with ice.","note":"The ice breaks down the strength of this high-proof cocktail, which owes its name to the tier effect created by layering the alcohol."},{"id":"358","name":"Goober","category":"Liqueurs / Other Spirits","page":632,"glass":"Rocks","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Crème de framboise","amount":"1½ oz / 42 ml"},{"name":"Midori","amount":"1½ oz / 42 ml"},{"name":"Triple sec","amount":"1 oz / 28 ml"},{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Orange juice","amount":"4 oz / 112 ml"},{"name":"Pineapple juice","amount":"3 oz / 84 ml"},{"name":"Grenadine","amount":"1 oz / 28 ml"}],"instructions":"Pour all of the ingredients into a shaker. Shake with ice and strain into an ice-filled glass. Put 2 slices of kiwi fruit and 2 fresh raspberries inside the glass to garnish.","note":"This is an outstanding fruity mix. Adding vodka to a liqueur-based cocktail will immediately lessen the sweetness."},{"id":"359","name":"Heat Wave","category":"Liqueurs / Other Spirits","page":634,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Coconut liqueur","amount":"1¼ oz / 35 ml"},{"name":"Peach schnapps","amount":"½ oz / 14 ml"},{"name":"Apricot brandy","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"3 oz / 84 ml"},{"name":"Pineapple juice","amount":"3 oz / 84 ml"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Put a slice of fresh peach inside the glass to garnish.","note":"This is a sweet, exotic, golden-coloured cocktail."},{"id":"360","name":"Forest Flower","category":"Liqueurs / Other Spirits","page":635,"glass":"Martini","alcoholRating":1,"starRating":3,"ingredients":[{"name":"Parfait amour","amount":"1 oz / 28 ml"},{"name":"Crème de cacao (white)","amount":"1 tbsp"},{"name":"Light cream","amount":"1 tbsp"},{"name":"Grenadine","amount":"1 tsp"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Garnish with an edible flower, such as a violet or nasturtium.","note":"Parfait amour tastes of violets and lavender, hence this cocktail's name."},{"id":"361","name":"Splash and Crash","category":"Liqueurs / Other Spirits","page":637,"glass":"Rocks","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Amaretto","amount":"2 oz / 56 ml"},{"name":"Cranberry juice","amount":"6 oz / 168 ml"},{"name":"Orange juice","amount":"2 oz / 56 ml"},{"name":"151-proof rum","amount":"½ oz / 14 ml"}],"instructions":"Pour the first 3 ingredients into a glass filled with ice. Float the rum on top. Place a lime wheel inside the drink and drop in 3 cranberries. Serve with a straw.","note":"This drink is unstirred and should be drunk through a straw. The 151-proof rum will hit you at the end!"},{"id":"362","name":"Sweet Señorita","category":"Liqueurs / Other Spirits","page":638,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Port","amount":"1 oz / 28 ml"},{"name":"Brandy","amount":"¾ oz / 21 ml"},{"name":"Triple sec","amount":"¼ tsp"},{"name":"Pineapple juice","amount":"¾ oz / 21 ml"},{"name":"Grenadine","amount":"¼ tsp"}],"instructions":"Shake all the ingredients together with ice and strain into a glass. Place a cinnamon stick inside the glass to garnish.","note":"This is a variation of the Spanish summer drink sangria, made with port instead of red wine."},{"id":"363","name":"Rusty Nail","category":"Liqueurs / Other Spirits","page":641,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Drambuie","amount":"1 oz / 28 ml"},{"name":"Blended scotch","amount":"1 oz / 28 ml"}],"instructions":"Pour the ingredients into a glass filled with ice and stir.","note":"Drambuie is made of blended scotch whisky and heather honey. A smooth and simple drink, popular in cigar bars."},{"id":"364","name":"Picon Bier","category":"Liqueurs / Other Spirits","page":642,"glass":"Rocks","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Amer Picon","amount":"1 oz / 28 ml"},{"name":"Lager beer","amount":"to top"}],"instructions":"Pour the Amer Picon into a tall, cold glass. Top with chilled lager beer.","note":"A traditional refresher in the cafés of southern France. Amer Picon is a bittersweet apéritif flavoured with herbs and spices."},{"id":"365","name":"Jazz Negroni","category":"Liqueurs / Other Spirits","page":643,"glass":"Rocks","alcoholRating":4,"starRating":4,"ingredients":[{"name":"London dry gin","amount":"1 oz / 28 ml"},{"name":"Jägermeister","amount":"1 oz / 28 ml"},{"name":"Sweet vermouth","amount":"1 oz / 28 ml"},{"name":"Orange bitters","amount":"dash"}],"instructions":"Pour all the ingredients into an ice-filled shaker and stir. Strain into a chilled glass, and garnish with a fat twist of orange peel.","note":"A variation of the classic Negroni — a more approachable version."},{"id":"366","name":"Shokabuku","category":"Liqueurs / Other Spirits","page":645,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Pink grapefruit","amount":"½, peeled and diced"},{"name":"Vanilla sugar","amount":"3 tsp"},{"name":"Dubonnet","amount":"2½ oz / 70 ml"}],"instructions":"Put the grapefruit in a shaker and pour the sugar on top. Muddle vigorously. Add the Dubonnet and crushed ice, folding the ingredients together with a spoon. Pour into the glass, and add more crushed ice to fill. Put 2 peeled grapefruit segments into the glass to garnish.","note":"A very simple drink that brings out the complex citrus flavours in Dubonnet, the Queen of England's favourite apéritif."},{"id":"367","name":"Sherry Cobbler","category":"Liqueurs / Other Spirits","page":646,"glass":"Rocks","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Orange","amount":"¼, chopped"},{"name":"Pineapple chunks","amount":"3"},{"name":"Sweet sherry","amount":"2 oz / 56 ml"},{"name":"Superfine sugar","amount":"1 tsp"}],"instructions":"Muddle the fruit in a shaker with the sherry and sugar, and shake with ice. Strain into a glass filled with cracked ice. Decorate with an orange slice, a stick of pineapple and sprigs of mint, and add a straw.","note":"In the late 19th century, this was possibly the world's bestselling cocktail."},{"id":"368","name":"Jagerinha","category":"Liqueurs / Other Spirits","page":647,"glass":"Rocks","alcoholRating":4,"starRating":3,"ingredients":[{"name":"Lime","amount":"1, cut into eighths"},{"name":"Soft brown sugar","amount":"2 tsp"},{"name":"Jägermeister","amount":"2 oz / 56 ml"},{"name":"Angostura bitters","amount":"dash"}],"instructions":"Put the fruit and sugar into the glass and muddle. Add the Jägermeister, the bitters and some crushed ice. Stir, top with more crushed ice if necessary, and add a straw.","note":"A richer, earthier version of the Brazilian classic Caipirinha, given depth by the herbal German liqueur Jägermeister."},{"id":"369","name":"Bellini","category":"The Champagne Base","page":650,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Peach purée","amount":"1 oz / 28 ml"},{"name":"Peach schnapps","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the purée and the liqueur into a flute and top with champagne. Garnish with a twisted peel of peach.","note":"Invented at Harry's Bar, Venice, in the 1940s, named after the 15th-century painter Giovanni Bellini."},{"id":"370","name":"Nikiski Bellini","category":"The Champagne Base","page":652,"glass":"Flute","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Peach schnapps","amount":"dash"},{"name":"Peach purée","amount":"2 oz / 56 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and pour the mix into the flute. Top with champagne and drop 4 peach slices into the flute to garnish.","note":"Be careful: the vodka will increase the alcohol content, but the taste of the vodka will be overpowered by the champagne and peach."},{"id":"371","name":"Strawberry Bellini","category":"The Champagne Base","page":654,"glass":"Flute","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Strawberry liqueur","amount":"dash"},{"name":"Strawberry purée","amount":"1 oz / 28 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the first 3 ingredients into a flute and stir. Top with champagne (pouring slowly) and stir again. Place one whole strawberry on the rim of the flute to garnish.","note":"A delicious example of how to mix strawberries and champagne. Also tastes good with raspberry liqueur instead of strawberry."},{"id":"372","name":"Gin-Schnapp","category":"The Champagne Base","page":656,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Peach schnapps","amount":"1 oz / 28 ml"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the first 3 ingredients into a flute and stir. Top with champagne. Put a slice of peach inside the flute to garnish.","note":"A sweet yet refreshing and easy-to-drink cocktail — great for late afternoons."},{"id":"373","name":"Mimo-Sec","category":"The Champagne Base","page":659,"glass":"Flute","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Triple sec","amount":"1 oz / 28 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the triple sec into a flute and top with champagne. Garnish with a loose orange twist.","note":"Based on the Mimosa, but made with triple sec rather than orange juice and Grand Marnier."},{"id":"374","name":"Mimosa","category":"The Champagne Base","page":660,"glass":"Flute","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Orange juice","amount":"1 oz / 28 ml"},{"name":"Grand Marnier","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the orange juice and the Grand Marnier into a flute and top with champagne. Place a loose orange twist inside the flute to garnish.","note":"The Mimosa was created at the Ritz Hotel Bar, Paris, in 1925. The gentle fizz and low alcohol content make it the ultimate brunch cocktail."},{"id":"375","name":"Pippin Zoë","category":"The Champagne Base","page":662,"glass":"Flute","alcoholRating":1,"starRating":5,"ingredients":[{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Grenadine","amount":"dash"},{"name":"Lemon juice","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into the flute. Top with champagne. To garnish, squeeze half a pomegranate over the drink to release pips into the mix.","note":"The pips used in the garnish will enhance the pomegranate flavour of the grenadine."},{"id":"376","name":"Ritz Fizz","category":"The Champagne Base","page":664,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Blue curaçao","amount":"dash"},{"name":"Amaretto","amount":"dash"},{"name":"Lemon juice","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the first 3 ingredients, in order, into the flute. Top with champagne and stir. Float a rose petal on top of the drink to decorate.","note":"The blue curaçao turns this cocktail turquoise and gives the amaretto a citrus tang."},{"id":"377","name":"Oriental Ginger","category":"The Champagne Base","page":664,"glass":"Flute","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Sake","amount":"½ oz / 14 ml"},{"name":"Ginger-infused vodka","amount":"½ oz / 14 ml"},{"name":"Sugar syrup","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour all of the ingredients (except for the champagne) into a flute. Top with champagne. Place 4 thin strips of ginger into the flute to garnish.","note":"To infuse vodka with ginger, see p.28. Alternatively, muddle 4 slices of fresh ginger with the sugar syrup."},{"id":"378","name":"Kir Royale","category":"The Champagne Base","page":669,"glass":"Flute","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Crème de cassis","amount":"½ oz / 14 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the cassis into the flute and top with champagne.","note":"The Royale refers to the fact that this pre-dinner cocktail is made with champagne instead of white wine."},{"id":"379","name":"Champagne Classic","category":"The Champagne Base","page":671,"glass":"Flute","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Angostura bitters","amount":"3 drops"},{"name":"Sugar cube (white)","amount":"1"},{"name":"Brandy","amount":"¾ oz / 21 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Drip the bitters onto the sugar cube and place the cube inside the flute. Pour in the brandy and top with champagne. Garnish with a loose orange twist.","note":"Created at the very end of the 19th century in New York. The mix gradually becomes sweeter as you get closer to the sugar cube at the bottom."},{"id":"380","name":"Sweet Juniper","category":"The Champagne Base","page":673,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Superfine sugar","amount":"1 tsp"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the gin together with the sugar and strain into the flute. Top with champagne.","note":"Don't worry about the sugar sitting at the bottom — as the champagne bubbles rise, they will bring the sweetness with them."},{"id":"381","name":"French 75","category":"The Champagne Base","page":674,"glass":"Flute","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of 1 lemon"},{"name":"Sugar syrup","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into a flute. Top with champagne and gently stir. To garnish, place 8 to 10 thin slices of lemon peel inside the glass, and drop in a cherry.","note":"Created by bartender Harry MacElhone at Harry's New York Bar, Paris, in 1925. Named after the 75 field gun used by the French army in World War II."},{"id":"382","name":"Stockholm 75","category":"The Champagne Base","page":676,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Citrus vodka","amount":"¾ oz / 21 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Sugar syrup","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into a sugar-rimmed flute. Top with champagne.","note":"This is the vodka version of the French 75. You can make it with regular vodka if you prefer."},{"id":"383","name":"Double Luxury","category":"The Champagne Base","page":678,"glass":"Flute","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Orange bitters","amount":"2 dashes"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the brandy and the bitters into a flute. Top with champagne and stir. Place a loose orange twist inside the glass to garnish.","note":"This cocktail combines France's most famous exports in one glass!"},{"id":"384","name":"Pick Me Up","category":"The Champagne Base","page":679,"glass":"Flute","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"¾ oz / 21 ml"},{"name":"Orange juice","amount":"¾ oz / 21 ml"},{"name":"Sugar syrup","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 4 ingredients together with ice and strain into a flute. Top with champagne. Place a twist of lemon and a twist of orange inside the flute to garnish.","note":"This is a sweet and refreshing cocktail, which does just as the name says!"},{"id":"385","name":"J'adore","category":"The Champagne Base","page":681,"glass":"Flute","alcoholRating":1,"starRating":3,"ingredients":[{"name":"Vodka","amount":"½ oz / 14 ml"},{"name":"Chambord","amount":"dash"},{"name":"Apple juice","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"½ oz / 14 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour all of the ingredients (except for the champagne) into the flute. Top with champagne and stir. Drop 2 raspberries into the drink to garnish.","note":"The sweet apple and Chambord are tempered by the dry champagne and tangy orange."},{"id":"386","name":"Honey Apple","category":"The Champagne Base","page":682,"glass":"Flute","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Whiskey","amount":"1 oz / 28 ml"},{"name":"Apple juice","amount":"1 oz / 28 ml"},{"name":"Honey","amount":"1 tbsp"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into the flute. Top with champagne and put 2 thin slices of apple into the drink to garnish.","note":"Whiskey and champagne are an unusual mix, but this sweet cocktail works well."},{"id":"387","name":"Vyagra","category":"The Champagne Base","page":683,"glass":"Flute","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vya sweet vermouth","amount":"1 oz / 28 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the Vya into the flute and top with champagne. To garnish, put an orange twist inside the flute.","note":"Vya is a relatively new Californian vermouth. Try adding a sugar cube dipped in orange bitters for a Vya vermouth version of the Champagne Classic."},{"id":"388","name":"Black Magic","category":"The Champagne Base","page":684,"glass":"Flute","alcoholRating":1,"starRating":3,"ingredients":[{"name":"Red grape juice","amount":"2 oz / 56 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the grape juice and triple sec into the flute and top with champagne. To garnish, drop 3 red grapes (halved) into the drink.","note":"This bitter-sweet mix of grape and orange will create the perfect celebratory apéritif."},{"id":"389","name":"Old Cuban","category":"The Champagne Base","page":686,"glass":"Flute","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Havana Club rum","amount":"1 oz / 28 ml"},{"name":"Lime juice","amount":"1 oz / 28 ml"},{"name":"Sugar syrup","amount":"½ oz / 14 ml"},{"name":"Mint leaves","amount":"6"},{"name":"Angostura bitters","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Put all of the ingredients (except for the champagne) into a shaker and shake with ice. Strain into a flute. Top with champagne, and add a twist of lime to garnish.","note":"A modern drink with an old-fashioned name, this is a creation of New York's Audrey Saunders."},{"id":"390","name":"Black Velvet","category":"The Champagne Base","page":687,"glass":"Flute","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Champagne","amount":"half"},{"name":"Guinness","amount":"half"}],"instructions":"Half-fill a chilled flute with champagne and agitate it gently with a teaspoon. Top with Guinness, pouring it over the back of the teaspoon to avoid too much frothing. Stir briefly and serve.","note":"Created at London's Brook's Club when Queen Victoria's husband Prince Albert died in 1861. The sparkling wine lightens and livens up the dark stout beer."},{"id":"391","name":"Dr Blinker Fizz","category":"The Champagne Base","page":689,"glass":"Flute","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Pink grapefruit juice","amount":"1 oz / 28 ml"},{"name":"Raspberry syrup","amount":"½ oz / 14 ml"},{"name":"Bourbon","amount":"1 oz / 28 ml"},{"name":"Rosé champagne","amount":"to top"}],"instructions":"Pour the first 3 ingredients into a flute and stir. Top with rosé champagne.","note":"This is a great soft champagne cocktail — pretty, pink and gentle."},{"id":"392","name":"Jam Nitty-Gritty","category":"The Champagne Base","page":690,"glass":"Martini","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Raspberry purée","amount":"2 tsp"},{"name":"Sugar syrup","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"1 oz / 14 ml"},{"name":"Gin","amount":"1 oz / 14 ml"},{"name":"Egg white","amount":"dash (optional)"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour all the ingredients (except for the champagne) into a chilled shaker. Shake, and strain the mixture into the glass. Top with champagne, and garnish with a raspberry.","note":"This cocktail was originally created using raspberry jam! We've refined it to include zingy fresh fruit."},{"id":"393","name":"Champagne Cobbler","category":"The Champagne Base","page":691,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Fresh pineapple chunks","amount":"3"},{"name":"Orange","amount":"1 wedge, chopped"},{"name":"Maraschino","amount":"dash"},{"name":"Sugar syrup","amount":"dash"},{"name":"Champagne","amount":"to top"}],"instructions":"Muddle the fruit in a shaker with ice. Add the maraschino and sugar syrup, and a splash of champagne. Stir, and strain into a tall glass filled with cracked ice. Top with champagne, and garnish with a pineapple stick, slices of lemon and orange and a sprig of mint.","note":"Nothing says decadence quite like this fruity extravaganza."},{"id":"394","name":"Spritz","category":"The Champagne Base","page":692,"glass":"Flute","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Campari","amount":"1 oz / 28 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Pour the Campari into a flute, and top with champagne. Stir briefly, and add a strawberry or two to garnish.","note":"To transform into a classic Italian aperitif, substitute prosecco for the champagne, and use Aperol instead of Campari."}];
