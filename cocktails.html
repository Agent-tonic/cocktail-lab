  {id:"p002",name:"Sonny Rollins Collins",category:"The Gin Base",page:229,alcoholRating:3,starRating:4,glass:"Highball",ingredients:[{name:"Gin",amount:"1 oz / 28 ml"},{name:"Sloe gin",amount:"1 oz / 28 ml"},{name:"Lemon juice",amount:"1 oz / 28 ml"},{name:"Sugar syrup",amount:"½ oz / 14 ml"},{name:"Rosé champagne",amount:"to top"},{name:"Crème de mûre",amount:"dash"}],instructions:"Pour the first 4 ingredients into an ice-filled glass, top with rosé champagne, and stir. Drizzle the crème de mûre on top. Garnish with a slice of lemon and a blackberry.",note:"Created at Ronnie Scott's Jazz Club in London."},
  {id:"p003",name:"Wild Thing",category:"The Tequila Base",page:226,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Cranberry juice",amount:"1 oz / 28 ml"},{name:"Lime juice",amount:"½ oz / 14 ml"},{name:"Soda water",amount:"1 oz / 28 ml"}],instructions:"Pour the first 3 ingredients into a glass filled with ice. Top with soda water. Put a lime wheel inside the glass to garnish.",note:"This smooth and refreshing cocktail goes down really easily and quickly."},
  {id:"p004",name:"Purple Poncho",category:"The Tequila Base",page:229,alcoholRating:2,starRating:3,glass:"Martini",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Blue curaçao",amount:"½ oz / 14 ml"},{name:"Sloe gin",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Sugar syrup",amount:"dash"}],instructions:"Pour all ingredients into a shaker, shake with ice and strain into the glass. Place a lime wheel on the rim.",note:"The mix of curaçao and sloe gin creates a sweet, herbal-flavoured cocktail."},
  {id:"p005",name:"Tequila Canyon",category:"The Tequila Base",page:230,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Triple sec",amount:"dash"},{name:"Cranberry juice",amount:"4 oz / 112 ml"},{name:"Orange juice",amount:"¼ oz / 7 ml"},{name:"Pineapple juice",amount:"¼ oz / 7 ml"}],instructions:"Pour all ingredients into a glass filled with ice. Stir gently. Put a lime wheel inside to garnish.",note:"The sweetness of the pineapple takes the edge off the bitter cranberry — a great summer drink."},
  {id:"p006",name:"South of the Border",category:"The Tequila Base",page:231,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Kahlúa",amount:"¾ oz / 21 ml"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Shake all the ingredients together with ice, and strain into an ice-filled glass. Place a slice of lime inside to garnish.",note:"The lime brings out the sourness of the tequila, while the Kahlúa creates a rich flavour."},
  {id:"p007",name:"Tequila Pink",category:"The Tequila Base",page:232,alcoholRating:3,starRating:3,glass:"Martini",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Dry vermouth",amount:"1 oz / 28 ml"},{name:"Grenadine",amount:"dash"}],instructions:"Shake the ingredients together with ice, and strain into the glass.",note:"Although the grenadine adds sweetness, this is still a strong, tequila-flavoured drink."},
  {id:"p008",name:"Catalina Margarita",category:"The Tequila Base",page:234,alcoholRating:3,starRating:5,glass:"Margarita",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Blue curaçao",amount:"1 oz / 28 ml"},{name:"Peach schnapps",amount:"1 oz / 28 ml"},{name:"Sour mix",amount:"4 oz / 112 ml"}],instructions:"Shake all the ingredients with ice, and strain into a chilled margarita glass. Garnish with a lime twist.",note:"The chilled glass will help to keep this slow-sipping drink cool."},
  {id:"p009",name:"Tequila Sunrise",category:"The Tequila Base",page:237,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Orange juice",amount:"4 oz / 112 ml"},{name:"Grenadine",amount:"¾ oz / 21 ml"}],instructions:"Pour the tequila and the orange into a shaker; stir with ice and strain into a glass. Add ice cubes. Pour in the grenadine and allow it to sink to the bottom. Garnish with a lime wheel.",note:"A hugely popular modern classic — the grenadine streaks red through the orange drink as it slowly sinks to give the famous sunrise effect."},
  {id:"p010",name:"Mexicana",category:"The Tequila Base",page:238,alcoholRating:2,starRating:3,glass:"Martini",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Lemon juice",amount:"1 oz / 28 ml"},{name:"Pineapple juice",amount:"1 tbsp"},{name:"Grenadine",amount:"1 tsp"}],instructions:"Shake all the ingredients together with ice, and strain into the glass. Put a lime wheel and a pineapple leaf inside to garnish.",note:"The grenadine enhances the sweetness of the pineapple — a sweet-and-sour cocktail."},
  {id:"p011",name:"Hairy Sunrise",category:"The Tequila Base",page:238,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Tequila",amount:"¾ oz / 21 ml"},{name:"Vodka",amount:"¾ oz / 21 ml"},{name:"Triple sec",amount:"½ oz / 14 ml"},{name:"Orange juice",amount:"3 oz / 84 ml"},{name:"Grenadine",amount:"2-3 dashes"}],instructions:"Blend the first 4 ingredients with a cup of crushed ice until smooth. Pour into a glass. Carefully pour in the grenadine.",note:"The grenadine trickles down into the drink, giving the appearance of hair — hence the name."},
  {id:"p012",name:"Tequila Old-Fashioned",category:"The Tequila Base",page:240,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Orange peel",amount:"strip"},{name:"Brown sugar",amount:"½ tsp"},{name:"Angostura bitters",amount:"dash"},{name:"Tequila",amount:"1¾ oz / 49 ml"},{name:"Soda water",amount:"splash"}],instructions:"Mix the orange peel together with the sugar, bitters and a dash of tequila. Pour in the remaining tequila. While stirring, slowly add ice to chill the glass. Top with soda water.",note:"The pineapple will release enough flavour so the drink is not too bitter."},
  {id:"p013",name:"Tijuana Taxi",category:"The Tequila Base",page:242,alcoholRating:3,starRating:4,glass:"Highball",ingredients:[{name:"Gold tequila",amount:"2 oz / 56 ml"},{name:"Blue curaçao",amount:"1 oz / 28 ml"},{name:"Liqueur of choice",amount:"1 oz / 28 ml"},{name:"Soda water",amount:"to top"}],instructions:"Pour the tequila, curaçao and liqueur into a glass filled with ice. Fill with soda water. Drop in a cherry to garnish.",note:"The liqueur is needed to sweeten this otherwise strong-tasting cocktail."},
  {id:"p014",name:"Shady Lady",category:"The Tequila Base",page:243,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Midori",amount:"1 oz / 28 ml"},{name:"Grapefruit juice",amount:"4 oz / 112 ml"}],instructions:"Pour the ingredients into a glass filled with ice. Put a lime wheel and a cherry into the drink to garnish.",note:"For a more fruity flavour, add a large slice of honeydew melon; muddle the chopped fruit in a shaker."},
  {id:"p015",name:"La Bomba",category:"The Tequila Base",page:244,alcoholRating:2,starRating:3,glass:"Margarita",ingredients:[{name:"Gold tequila",amount:"1½ oz / 42 ml"},{name:"Triple sec",amount:"¾ oz / 21 ml"},{name:"Apricot brandy",amount:"2 dashes"},{name:"Orange juice",amount:"1½ oz / 42 ml"},{name:"Pineapple juice",amount:"1½ oz / 42 ml"}],instructions:"Shake all ingredients together with ice and pour into a sugar-rimmed glass. Place a lime wheel on the rim.",note:"For a healthier version, muddle chopped fresh fruit in a shaker, add the alcohol and pour."},
  {id:"p016",name:"Silk Stockings",category:"The Tequila Base",page:246,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Crème de cacao (brown)",amount:"1 oz / 28 ml"},{name:"Light cream",amount:"1½ oz / 42 ml"},{name:"Grenadine",amount:"dash"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Sprinkle cinnamon on top to garnish.",note:"A deliciously creamy after-dinner cocktail."},
  {id:"p017",name:"Bulldog",category:"The Tequila Base",page:248,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Kahlúa",amount:"1 oz / 28 ml"}],instructions:"Pour the ingredients into a glass filled with ice. Stir. Place a twist of lemon inside to garnish.",note:"Kahlúa is a sweet, coffee-flavoured liqueur produced from Arabica coffee beans."},
  {id:"p018",name:"Mexican Madras",category:"The Tequila Base",page:250,alcoholRating:1,starRating:4,glass:"Rocks",ingredients:[{name:"Gold tequila",amount:"1 oz / 28 ml"},{name:"Cranberry juice",amount:"3 oz / 84 ml"},{name:"Orange juice",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"dash"}],instructions:"Pour all ingredients into a shaker; shake together with ice and strain into a glass. Place a slice of orange inside to garnish.",note:"This is the harsher-tasting tequila version of the vodka Madras."},
  {id:"p019",name:"Tequila Collins",category:"The Tequila Base",page:252,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar",amount:"1 tsp"},{name:"Soda water",amount:"to top"}],instructions:"Shake all the ingredients (except soda water) with ice and strain into an ice-filled glass. Top with soda water and stir. Garnish with lemon, orange twists and a cherry.",note:"This is the tequila version of the classic gin-based Tom Collins."},
  {id:"p020",name:"Crushing Hazel",category:"The Tequila Base",page:254,alcoholRating:1,starRating:5,glass:"Martini",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Crème de cacao (white)",amount:"dash"},{name:"Frangelico",amount:"dash"},{name:"Light cream",amount:"dash"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Sprinkle with crushed hazelnuts to garnish.",note:"Frangelico is an Italian liqueur made from herbs, berries and hazelnuts."},
  {id:"p021",name:"Tequini",category:"The Tequila Base",page:256,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Dry vermouth",amount:"½ oz / 14 ml"},{name:"Angostura bitters",amount:"dash (optional)"}],instructions:"Pour the ingredients into a shaker, stir with ice and strain into the glass. Garnish with a twist of lemon and an olive.",note:"This is a martini made with tequila instead of vodka or gin."},
  {id:"p022",name:"Margarita",category:"The Tequila Base",page:257,alcoholRating:3,starRating:5,glass:"Margarita",ingredients:[{name:"Gold tequila",amount:"2 oz / 56 ml"},{name:"Triple sec",amount:"1 oz / 28 ml"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Shake all the ingredients together with ice and strain into a chilled, salt-rimmed glass. Garnish with fresh lime halves.",note:"The ultimate tequila classic."},
  {id:"p023",name:"Sloe Tequila",category:"The Tequila Base",page:259,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Sloe gin",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"1 tbsp"}],instructions:"Blend the ingredients with half a cup of crushed ice and pour into the glass. Add 3 ice cubes. Put a twist of cucumber peel inside to garnish.",note:"This is a wonderfully smooth and fresh-tasting combination."},
  {id:"p024",name:"Strawberry Margarita",category:"The Tequila Base",page:261,alcoholRating:2,starRating:5,glass:"Margarita",ingredients:[{name:"Strawberries",amount:"3"},{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Strawberry liqueur",amount:"½ oz / 14 ml"},{name:"Triple sec",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Muddle the strawberries in a shaker. Add the remaining ingredients. Shake with ice and strain into a sugar-rimmed glass. Float 2 strawberry slices on top.",note:"You can substitute the strawberry with other fresh fruit — try raspberry, kiwi or mango."},
  {id:"p025",name:"Pom-Amore",category:"The Tequila Base",page:262,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Pomegranate",amount:"½"},{name:"Sugar syrup",amount:"dash"},{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Parfait amour",amount:"¼ oz / 7 ml"}],instructions:"Squeeze the pomegranate into the shaker. Muddle the flesh with the sugar. Add the tequila and parfait amour. Shake with ice and strain. Garnish with pomegranate pips and a pansy head.",note:"One of my favourite cocktails I have ever created."},
  {id:"p026",name:"Tequila Manhattan",category:"The Tequila Base",page:264,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Sweet vermouth",amount:"1 oz / 28 ml"},{name:"Lime juice",amount:"dash"}],instructions:"Shake the ingredients with ice, and strain into a glass with 1 ice cube. Drop a cherry and a twist of orange peel into the drink.",note:"A refined drink for serious tequila lovers."},
  {id:"p027",name:"Traffic Light Cooler",category:"The Tequila Base",page:266,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Midori",amount:"¾ oz / 21 ml"},{name:"Gold tequila",amount:"1 oz / 28 ml"},{name:"Sour mix",amount:"splash"},{name:"Orange juice",amount:"2 oz / 56 ml"},{name:"Sloe gin",amount:"½ oz / 14 ml"}],instructions:"Layer this drink: pour the Midori for green, add the tequila, then sour mix. Slowly add orange juice for amber. Float sloe gin on top for red.",note:"Serve unstirred to preserve the 3 colourful layers."},
  {id:"p028",name:"Pacific Sunshine",category:"The Tequila Base",page:267,alcoholRating:2,starRating:3,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Blue curaçao",amount:"1½ oz / 42 ml"},{name:"Sour mix",amount:"1½ oz / 42 ml"},{name:"Angostura bitters",amount:"dash"}],instructions:"Stir all the ingredients together with ice and pour into a chilled, salt-rimmed glass. Put a lemon wheel inside to garnish.",note:"The bitters add a herbal flavour to this sour drink."},
  {id:"p029",name:"Blue Margarita",category:"The Tequila Base",page:269,alcoholRating:2,starRating:3,glass:"Margarita",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Blue curaçao",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"}],instructions:"Shake the ingredients together with ice, and strain into a salt-rimmed glass. Place a loose orange twist inside to garnish.",note:"Alternatively, blend with crushed ice for an opaque-blue appearance."},
  {id:"p030",name:"Tequila Mockingbird",category:"The Tequila Base",page:270,alcoholRating:2,starRating:2,glass:"Martini",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Crème de menthe (green)",amount:"¾ oz / 21 ml"},{name:"Lime juice",amount:"juice of 1 lime"}],instructions:"Shake all the ingredients together with ice and strain into the glass.",note:"If you aren't a fan of crème de menthe, you can use fresh mint and a dash of sugar syrup."},
  {id:"p031",name:"Chapala",category:"The Tequila Base",page:272,alcoholRating:1,starRating:4,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Apricot brandy",amount:"1 tsp"},{name:"Blue curaçao",amount:"1 tsp"},{name:"Triple sec",amount:"dash"},{name:"Lemon juice",amount:"1 tbsp"},{name:"Orange juice",amount:"1 tbsp"}],instructions:"Pour all ingredients into a shaker; shake with ice and strain into an ice-filled glass. Put a slice of orange inside to garnish.",note:"If drunk slowly this is a refreshing cocktail and a good apéritif."},
  {id:"p032",name:"Tequila Sour",category:"The Tequila Base",page:272,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar",amount:"1 tsp"},{name:"Egg white",amount:"dash (optional)"}],instructions:"Shake the ingredients with ice and strain into the glass. Put a slice of lemon and a cherry inside to garnish.",note:"If shaken with egg white, this drink will have a frothy, cappuccino-like head."},
  {id:"p033",name:"Hot Pants",category:"The Tequila Base",page:275,alcoholRating:1,starRating:3,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Liqueur of choice",amount:"½ oz / 14 ml"},{name:"Grapefruit juice",amount:"1 tbsp"},{name:"Mint leaves",amount:"2"},{name:"Sugar",amount:"1 tsp"}],instructions:"Shake all the ingredients together with ice and pour into an ice-filled glass. Put a sprig of mint on top.",note:"This drink works well with any flavour of liqueur — peach is my personal favourite."},
  {id:"p034",name:"Rosita",category:"The Tequila Base",page:276,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1 oz / 28 ml"},{name:"Campari",amount:"1 oz / 28 ml"},{name:"Dry vermouth",amount:"½ oz / 14 ml"},{name:"Sweet vermouth",amount:"½ oz / 14 ml"}],instructions:"Pour the ingredients into an ice-filled glass and stir. Place a lemon twist inside to garnish.",note:"The combination of 3 types of vermouth makes this cocktail an excellent apéritif."},
  {id:"p035",name:"Cactus Berry",category:"The Tequila Base",page:278,alcoholRating:4,starRating:3,glass:"Margarita",ingredients:[{name:"Tequila",amount:"1¼ oz / 35 ml"},{name:"Red wine",amount:"1¼ oz / 35 ml"},{name:"Triple sec",amount:"1 oz / 28 ml"},{name:"Sour mix",amount:"6½ oz / 182 ml"},{name:"Lime juice",amount:"dash"}],instructions:"Shake all of the ingredients with ice and pour into a salt-rimmed glass.",note:"The red wine turns this into a sangria-tasting margarita."},
  {id:"p036",name:"Teutonic",category:"The Tequila Base",page:281,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Lime or lemon juice",amount:"juice of 1 lime or ½ lemon"},{name:"Tonic water",amount:"to top"}],instructions:"Pour the ingredients into a glass filled with ice. Top with tonic water and stir. Put slices of lemon and lime inside to garnish.",note:"The juice of the lemon or lime will temper this biting mix of tequila and tonic."},
  {id:"p037",name:"Purple Gecko",category:"The Tequila Base",page:283,alcoholRating:2,starRating:4,glass:"Margarita",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Blue curaçao",amount:"½ oz / 14 ml"},{name:"Cranberry juice",amount:"1½ oz / 42 ml"},{name:"Sour mix",amount:"1 oz / 28 ml"},{name:"Lime juice",amount:"½ oz / 14 ml"}],instructions:"Shake all of the ingredients together with ice and strain into a salt-rimmed glass. Garnish with a lime wedge.",note:"The cranberry gives this version of a margarita a distinctive berry taste."},
  {id:"p038",name:"Tequila Matador",category:"The Tequila Base",page:284,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Tequila",amount:"1½ oz / 42 ml"},{name:"Pineapple juice",amount:"3 oz / 84 ml"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Shake the ingredients together with ice and strain into an ice-filled old-fashioned glass. Put a pineapple leaf inside to garnish.",note:"Try this cocktail with a dash of champagne."},
  {id:"p039",name:"Tommy's Margarita",category:"The Tequila Base",page:284,alcoholRating:3,starRating:4,glass:"Rocks",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Agave syrup",amount:"½ oz / 14 ml"}],instructions:"Pour all the ingredients into an ice-filled shaker. Shake and strain into an ice-filled glass.",note:"The house cocktail at the legendary Tommy's Tequila Bar in San Francisco. The agave syrup replaces the regular triple sec."},
  {id:"p040",name:"Paloma",category:"The Tequila Base",page:288,alcoholRating:3,starRating:4,glass:"Highball",ingredients:[{name:"Tequila",amount:"2 oz / 56 ml"},{name:"Grapefruit soda",amount:"to top"},{name:"Lime",amount:"¼ squeeze"}],instructions:"Pour the tequila into an ice-filled glass. Top with grapefruit soda. Stir and add a squeeze of lime.",note:"An authentically Mexican treat."},
  {id:"p041",name:"El Diablo",category:"The Tequila Base",page:288,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Reposado tequila",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"½ oz / 14 ml"},{name:"Ginger ale",amount:"3 oz / 84 ml"},{name:"Crème de cassis",amount:"dash"}],instructions:"Pour the tequila, lime juice and ginger ale into an ice-filled glass. Stir, garnish with a slice of lime and a blackberry, then finish with a drizzle of cassis.",note:"A much-misunderstood drink from 1940s California."},
  {id:"p042",name:"Santa Clementina",category:"The Tequila Base",page:291,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Reposado tequila",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"½ oz / 14 ml"},{name:"Passion fruit syrup",amount:"dash"},{name:"Bitter lemon",amount:"3 oz / 84 ml"},{name:"Orange juice",amount:"2 oz / 56 ml"}],instructions:"Pour the first 4 ingredients over cubed ice, then stir as you top with orange juice.",note:"Oranges and Lemons, say the bells of St Clements."},
  {id:"p043",name:"Mañana Mañana",category:"The Tequila Base",page:292,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Watermelon",amount:"1 slice, peeled and chopped"},{name:"Sugar syrup",amount:"dash"},{name:"Tequila",amount:"2 oz / 56 ml"}],instructions:"Muddle the fruit with the sugar syrup and tequila and shake with ice. Strain into a cocktail glass and garnish with a watermelon skin sail.",note:"Watermelon melds beautifully with some of the softer tequilas."},
  {id:"p044",name:"Lucky Lily",category:"The Tequila Base",page:293,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Lime juice",amount:"½ oz / 14 ml"},{name:"Honey",amount:"dash"},{name:"Fresh pineapple, chopped",amount:"handful"},{name:"Reposado tequila",amount:"2 oz / 56 ml"},{name:"Black pepper",amount:"6 grinds"}],instructions:"Put the first 2 ingredients in a shaker, stir to dissolve honey. Add the pineapple and muddle, then add the tequila and pepper and shake with ice. Strain and finish with a grind of black pepper.",note:"The agave plant has much more in common with the humble lily."},
  {id:"p045",name:"Caribbean Romance",category:"The Rum Base",page:296,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Light rum",amount:"1¼ oz / 42 ml"},{name:"Amaretto",amount:"1 oz / 28 ml"},{name:"Orange juice",amount:"1½ oz / 42 ml"},{name:"Pineapple juice",amount:"1½ oz / 42 ml"},{name:"Grenadine",amount:"splash"}],instructions:"Pour the first 4 ingredients into a shaker; shake with ice and strain into an ice-filled glass. Add the grenadine. Place a slice of orange, lemon or lime on the rim.",note:"The combination of almondy amaretto and rum sets a romantic tone."},
  {id:"p046",name:"Quarter Deck",category:"The Rum Base",page:299,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Sherry",amount:"¼ oz / 7 ml"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Pour the ingredients into a shaker. Stir with ice and strain into the glass.",note:"The sherry gives this cocktail a creamy note."},
  {id:"p047",name:"Boston Cooler",category:"The Rum Base",page:300,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar",amount:"1 tsp"},{name:"Ginger ale or soda water",amount:"4 oz / 112 ml"}],instructions:"Pour the lemon juice, sugar and half the ginger ale into the glass and stir. Fill with ice, add the rum. Top with remaining ginger ale and stir again.",note:"A light and simple drink to serve at parties."},
  {id:"p048",name:"Knickerbocker Special",category:"The Rum Base",page:301,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Triple sec",amount:"½ tsp"},{name:"Lemon juice",amount:"1 tsp"},{name:"Orange juice",amount:"1 tsp"},{name:"Raspberry syrup",amount:"1 tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Place 2 raspberries and an orange slice inside to garnish.",note:"This is quite a strong, slightly zesty-tasting drink."},
  {id:"p049",name:"Rum Fix",category:"The Rum Base",page:302,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Lime or lemon juice",amount:"juice of 1 lime or ½ lemon"},{name:"Warm water",amount:"1 tsp"},{name:"Sugar",amount:"1 tsp"},{name:"Light rum",amount:"2½ oz / 70 ml"}],instructions:"Pour the first 3 ingredients into a glass and stir. Fill with ice. Pour in the rum and stir again. Put a slice of lemon inside to garnish.",note:"A fix is any short, strong, spirit-based cocktail served with ice."},
  {id:"p050",name:"Nevada",category:"The Rum Base",page:304,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Angostura bitters",amount:"dash"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Grapefruit juice",amount:"1 oz / 28 ml"},{name:"Sugar",amount:"3 tsp"}],instructions:"Shake all of the ingredients together with ice and strain into the glass.",note:"This is a sour-tasting cocktail with bitter undertones."},
  {id:"p051",name:"Apple Pie No. 1",category:"The Rum Base",page:306,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Sweet vermouth",amount:"½ oz / 14 ml"},{name:"Apple schnapps",amount:"1 tbsp"},{name:"Lemon juice",amount:"1 tsp"},{name:"Grenadine",amount:"½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Garnish with thinly sliced apple.",note:"The blend is a good appetite stabilizer and so is usually drunk as an apéritif."},
  {id:"p052",name:"Raspberry Delight",category:"The Rum Base",page:308,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Fresh raspberries",amount:"6 (plus 2-3 for garnish)"},{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Triple sec",amount:"½ tsp"},{name:"Lemon juice",amount:"1 tsp"},{name:"Orange juice",amount:"1 tsp"},{name:"Raspberry purée",amount:"1 tsp"}],instructions:"Muddle the fruit in a shaker. Pour in the remaining ingredients. Shake vigorously with ice and strain into the glass.",note:"A truly exceptional fresh-fruit cocktail."},
  {id:"p053",name:"Shanghai Noon",category:"The Rum Base",page:310,alcoholRating:1,starRating:5,glass:"Martini",ingredients:[{name:"Jamaica light rum",amount:"1 oz / 28 ml"},{name:"Pernod",amount:"1 tsp"},{name:"Lemon juice",amount:"juice of ¼ lemon"},{name:"Grenadine",amount:"½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Place a lemon peel inside to garnish.",note:"The Pernod adds an anise aroma to the caramel-tasting Jamaican rum."},
  {id:"p054",name:"Cool Blue",category:"The Rum Base",page:311,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Dark rum",amount:"1½ oz / 42 ml"},{name:"Cranberry juice",amount:"2 oz / 56 ml"},{name:"Pineapple juice",amount:"2 oz / 56 ml"},{name:"Sour mix",amount:"splash"},{name:"Blue curaçao",amount:"1 oz / 28 ml"}],instructions:"Shake all ingredients (except the curaçao) with ice and pour into an ice-filled glass. Float the curaçao on top.",note:"The sour cranberry and sweet pineapple complement each other beautifully."},
  {id:"p055",name:"Cuban Special",category:"The Rum Base",page:312,alcoholRating:1,starRating:4,glass:"Martini",ingredients:[{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Triple sec",amount:"½ tsp"},{name:"Lime juice",amount:"juice of ½ lime"},{name:"Pineapple juice",amount:"1 tbsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass.",note:"I usually leave this drink ungarnished, but you can slip in a stick of pineapple."},
  {id:"p056",name:"Daiquiri",category:"The Rum Base",page:318,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Sugar",amount:"1 tsp"}],instructions:"Shake the ingredients together with ice and strain into the glass. Alternatively, blend with crushed ice and pour into the glass.",note:"An American engineer, Jennings Cox, invented the Daiquiri in Cuba in 1896."},
  {id:"p057",name:"Moon Shake",category:"The Rum Base",page:318,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Dark rum",amount:"1½ oz / 42 ml"},{name:"Kahlúa",amount:"1 oz / 28 ml"},{name:"Lemon juice",amount:"1 tbsp"}],instructions:"Shake the ingredients together with ice and strain into the glass.",note:"You can substitute the Kahlúa with any flavoured liqueur of your choosing."},
  {id:"p058",name:"Passion Daiquiri",category:"The Rum Base",page:320,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Passion fruit",amount:"juice of ½ (plus ½ for garnish)"},{name:"Sugar",amount:"1 tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Squeeze the remaining half of the passion fruit over the drink.",note:"The fresh passion fruit gives this Daiquiri a sweet-and-sharp, fresh-fruit flavour."},
  {id:"p059",name:"Strawberry Daiquiri",category:"The Rum Base",page:323,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Fresh strawberries",amount:"1 oz / 28 g"},{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Strawberry liqueur",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Sugar",amount:"1 tsp"}],instructions:"Muddle the strawberries in a shaker. Add the remaining ingredients. Shake with ice and strain into the glass.",note:"Strawberry schnapps makes a good alternative to the liqueur."},
  {id:"p060",name:"Borinquen",category:"The Rum Base",page:324,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Orange juice",amount:"1 oz / 28 ml"},{name:"Passion fruit syrup",amount:"1 tbsp"},{name:"151-proof rum",amount:"1 tsp"}],instructions:"At low speed, blend all ingredients (except 151-proof rum) with half a cup of crushed ice. Pour into a glass. Float the 151-proof rum on top.",note:"The high-proof rum top gives this sweet and fruity cocktail an extra kick."},
  {id:"p061",name:"Mai Tai",category:"The Rum Base",page:315,alcoholRating:3,starRating:5,glass:"Highball",ingredients:[{name:"Dark rum",amount:"1 oz / 28 ml"},{name:"Gold rum",amount:"1 oz / 28 ml"},{name:"Triple sec",amount:"1 oz / 28 ml"},{name:"Apricot brandy",amount:"dash"},{name:"Pineapple juice",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"1 tbsp"},{name:"Orgeat syrup",amount:"1 tbsp"},{name:"Orange juice",amount:"splash"},{name:"Sugar",amount:"½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into a glass one-third filled with crushed ice. Decorate with a cherry and a wedge of pineapple.",note:"A universally popular, exotic, fruity cocktail that embodies the idyllic island feeling of white sandy beaches."},
  {id:"p062",name:"Rum Daisy",category:"The Rum Base",page:327,alcoholRating:2,starRating:3,glass:"Rocks",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Grenadine",amount:"1 tsp"},{name:"Sugar",amount:"½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into a glass half-filled with ice. Put slices of lemon, lime and kiwi fruit into the drink to garnish.",note:"This daisy is sweet-tasting with a hint of sourness."},
  {id:"p063",name:"Bacardi Cocktail",category:"The Rum Base",page:328,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Bacardi light rum",amount:"2½ oz / 70 ml"},{name:"Lime juice",amount:"¾ oz / 21 ml"},{name:"Grenadine",amount:"½ oz / 14 ml"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Decorate with a fresh, stemmed cherry.",note:"A classic rum cocktail."},
  {id:"p064",name:"Midnight Express",category:"The Rum Base",page:330,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Dark rum",amount:"1½ oz / 42 ml"},{name:"Triple sec",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"¾ oz / 21 ml"},{name:"Sour mix",amount:"splash"},{name:"Egg white",amount:"1 tsp (optional)"}],instructions:"Shake all the ingredients together with ice and strain into an ice-filled glass.",note:"This sour is made with lime and triple sec rather than lemon and sugar."},
  {id:"p065",name:"Night Cap",category:"The Rum Base",page:331,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Sugar",amount:"1 tsp"},{name:"Warm milk",amount:"to fill"}],instructions:"Pour the rum and sugar into an old-fashioned glass. Fill with warm milk and stir. Garnish with nutmeg.",note:"This drink is a great sleep-inducer — try it after a stressful day."},
  {id:"p066",name:"Palmetto",category:"The Rum Base",page:332,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Dry vermouth",amount:"1½ oz / 42 ml"},{name:"Orange bitters",amount:"2 dashes"}],instructions:"Pour the ingredients into a shaker; stir with ice and strain into the glass. Dangle a loose orange twist from the rim.",note:"This is a distinctively dry and herbal cocktail."},
  {id:"p067",name:"White Lily",category:"The Rum Base",page:335,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Gin",amount:"¾ oz / 21 ml"},{name:"Triple sec",amount:"¾ oz / 21 ml"},{name:"Pernod",amount:"¼ tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Garnish with any edible flower of your choice.",note:"The gin adds herbal notes to this sweet drink, and the Pernod gives it a liquorice finish."},
  {id:"p068",name:"Bermuda Triangle",category:"The Rum Base",page:334,alcoholRating:2,starRating:3,glass:"Rocks",ingredients:[{name:"Spiced rum",amount:"1 oz / 28 ml"},{name:"Peach schnapps",amount:"½ oz / 14 ml"},{name:"Orange juice",amount:"3 oz / 84 ml"}],instructions:"Pour the ingredients into a glass filled with ice.",note:"Spiced rum is flavoured with spices and herbs, such as cinnamon, pepper and vanilla."},
  {id:"p069",name:"Rum Swizzle",category:"The Rum Base",page:337,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Lime juice",amount:"juice of 1 lime"},{name:"Sugar",amount:"1 tsp"},{name:"Soda water",amount:"4 oz / 112 ml"},{name:"Angostura bitters",amount:"2 dashes"},{name:"Light or dark rum",amount:"2 oz / 56 ml"}],instructions:"Pour lime juice, sugar and half the soda water into a highball glass. Fill with ice and stir. Add the bitters and rum. Top with remaining soda. Serve with a swizzle stick.",note:"Originating in the West Indies in the early 1800s."},
  {id:"p070",name:"Mojito",category:"The Rum Base",page:338,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Mint leaves",amount:"10"},{name:"Sugar syrup",amount:"dash"},{name:"Havana Club rum",amount:"2 oz / 56 ml"},{name:"Soda water",amount:"to top"}],instructions:"Muddle the mint with the sugar in a highball glass. Fill with crushed ice and pour in the rum. Top with soda water. Garnish with a sprig of mint.",note:"This refreshing Cuban cocktail tastes great with a float of dark rum."},
  {id:"p071",name:"New Orleans Buck",category:"The Rum Base",page:340,alcoholRating:1,starRating:5,glass:"Highball",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Orange juice",amount:"1 oz / 28 ml"},{name:"Lemon juice",amount:"½ oz / 14 ml"},{name:"Ginger ale",amount:"to top"}],instructions:"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Top with ginger ale and stir.",note:"The sweet rum, sharp fruit and spicy ginger create a perfect balance of tastes."},
  {id:"p072",name:"Cocomacoque",category:"The Rum Base",page:341,alcoholRating:1,starRating:3,glass:"Highball",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Coconut rum",amount:"1 tsp"},{name:"Orange juice",amount:"2 oz / 56 ml"},{name:"Pineapple juice",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Coconut milk",amount:"1 tsp"},{name:"Red wine",amount:"1 oz / 28 ml"}],instructions:"Shake all ingredients (except wine) with ice. Pour into an ice-filled glass. Top with wine. Garnish with a pineapple stick and sprinkle coconut flakes on top.",note:"The red wine adds a hint of richness to this fruity-tasting cocktail."},
  {id:"p073",name:"151-Proof Passion",category:"The Rum Base",page:342,alcoholRating:3,starRating:4,glass:"Martini",ingredients:[{name:"Light rum",amount:"1¼ oz / 35 ml"},{name:"151-proof rum",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Orange juice",amount:"1 oz / 28 ml"},{name:"Passion fruit syrup",amount:"1 tbsp"},{name:"Fresh passion fruit",amount:"½ (for pips)"}],instructions:"Blend all ingredients together (except the passion fruit). Add half a cup of crushed ice and blend again at low speed. Pour into the glass. Squeeze passion fruit over and stir in pips.",note:"Once you blend a cocktail with ice you temper the alcohol."},
  {id:"p074",name:"Melon Man",category:"The Rum Base",page:344,alcoholRating:3,starRating:2,glass:"Highball",ingredients:[{name:"151-proof rum",amount:"1¼ oz / 35 ml"},{name:"Midori",amount:"¾ oz / 21 ml"},{name:"Orange juice",amount:"4 oz / 112 ml"}],instructions:"Pour the ingredients into a shaker; shake with ice and strain into an ice-filled glass. Place 2 thin slices of melon inside to garnish.",note:"This is a strong cocktail, which should be greeny-orange in colour."},
  {id:"p075",name:"Pink Paradise",category:"The Rum Base",page:347,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Rum",amount:"1 oz / 28 ml"},{name:"Coconut rum",amount:"½ oz / 14 ml"},{name:"Amaretto",amount:"1 oz / 28 ml"},{name:"Cranberry juice",amount:"3 oz / 84 ml"},{name:"Pineapple juice",amount:"1½ oz / 42 ml"}],instructions:"Pour the ingredients into an old-fashioned glass filled with ice. Garnish with a pineapple wedge and a cherry.",note:"You can also try this cocktail with fresh cranberries; muddle them in a shaker."},
  {id:"p076",name:"Banana Cow",category:"The Rum Base",page:348,alcoholRating:2,starRating:3,glass:"Martini",ingredients:[{name:"Dark rum",amount:"1 oz / 28 ml"},{name:"Crème de banane",amount:"1 oz / 28 ml"},{name:"Light cream",amount:"1½ oz / 42 ml"},{name:"Sugar syrup",amount:"dash"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Place a slice of banana inside and sprinkle nutmeg on top.",note:"This cocktail also tastes good blended with milk instead of cream."},
  {id:"p077",name:"Quaker's Cocktail",category:"The Rum Base",page:351,alcoholRating:1,starRating:4,glass:"Martini",ingredients:[{name:"Fresh raspberries",amount:"4"},{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Brandy",amount:"¼ oz / 7 ml"},{name:"Lemon juice",amount:"juice of ¼ lemon"},{name:"Raspberry syrup",amount:"2 tsp"}],instructions:"Muddle the raspberries in a shaker. Add the remaining ingredients. Shake with ice and strain into the glass.",note:"The raspberry syrup brings out the flavour of the fresh raspberries."},
  {id:"p078",name:"Hurricane Leah",category:"The Rum Base",page:352,alcoholRating:4,starRating:5,glass:"Highball",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Gin",amount:"¼ oz / 7 ml"},{name:"Tequila",amount:"¼ oz / 7 ml"},{name:"Vodka",amount:"¼ oz / 7 ml"},{name:"Blue curaçao",amount:"dash"},{name:"Cherry brandy",amount:"dash"},{name:"Orange juice",amount:"3 oz / 84 ml"}],instructions:"Pour all the ingredients into a glass filled with ice and stir. Garnish with a fresh cherry, an orange wheel and a lime wedge on the rim.",note:"This rum iced tea is a powerful mix."},
  {id:"p079",name:"Robson",category:"The Rum Base",page:353,alcoholRating:1,starRating:4,glass:"Rocks",ingredients:[{name:"Jamaica dark rum",amount:"1 oz / 28 ml"},{name:"Orange juice",amount:"1 tbsp"},{name:"Lemon juice",amount:"2 tsp"},{name:"Grenadine",amount:"1½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into an ice-filled glass. Put an orange wheel inside to garnish.",note:"The grenadine enhances the sweetness of the rich rum, balanced by the fresh orange and sharp lemon."},
  {id:"p080",name:"Caipirinha",category:"The Rum Base",page:355,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Lime",amount:"1 (cut into eighths)"},{name:"Brown sugar",amount:"2 tsp"},{name:"Cachaça",amount:"2 oz / 56 ml"}],instructions:"Muddle the lime together with the sugar in an old-fashioned glass. Fill with crushed ice. Pour in the cachaça and stir. Top with more crushed ice.",note:"Brazil's national drink."},
  {id:"p081",name:"Planter's Punch No. 1",category:"The Rum Base",page:356,alcoholRating:3,starRating:5,glass:"Highball",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Orange juice",amount:"juice of ½ orange"},{name:"Pineapple juice",amount:"1 tsp"},{name:"Jamaica dark rum",amount:"1 oz / 28 ml"},{name:"Triple sec",amount:"2 dashes"},{name:"Grenadine",amount:"dash"}],instructions:"Pour the first 5 ingredients into a glass filled with ice. Stir until the glass is frosted. Add the dark rum and stir again. Top with triple sec and grenadine. Garnish with slices of orange, lemon, lime and pineapple, and a sprig of mint.",note:"Jamaica dark rum is full-bodied, with a mellow caramel flavour."},
  {id:"p082",name:"Planter's Punch No. 2",category:"The Rum Base",page:358,alcoholRating:3,starRating:4,glass:"Highball",ingredients:[{name:"Lime juice",amount:"juice of 2 limes"},{name:"Soda water",amount:"2 oz / 56 ml"},{name:"Sugar",amount:"2 tsp"},{name:"Light rum",amount:"2½ oz / 70 ml"},{name:"Angostura bitters",amount:"2 dashes"},{name:"Grenadine",amount:"dash"}],instructions:"Pour the first 3 ingredients into a glass filled with ice. Stir until the glass is frosted. Add the rum and bitters. Stir again. Top with grenadine.",note:"A drier version of Planter's Punch No. 1, made without the Jamaica dark rum."},
  {id:"p083",name:"Mississippi Planter's Punch",category:"The Rum Base",page:361,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Bourbon",amount:"¼ oz / 7 ml"},{name:"Brandy",amount:"¼ oz / 7 ml"},{name:"Lemon juice",amount:"juice of 1 lemon"},{name:"Sugar",amount:"1 tbsp"},{name:"Soda water",amount:"to top"}],instructions:"Shake all ingredients (except soda) together with ice and strain into an ice-filled glass. Fill with soda and stir.",note:"Watch out — this mix of light and dark spirits will have a stronger effect than you might expect."},
  {id:"p084",name:"Sir Walter",category:"The Rum Base",page:363,alcoholRating:2,starRating:2,glass:"Martini",ingredients:[{name:"Light rum",amount:"¾ oz / 21 ml"},{name:"Brandy",amount:"¾ oz / 21 ml"},{name:"Triple sec",amount:"1 tsp"},{name:"Grenadine",amount:"1 tsp"},{name:"Lemon juice",amount:"1 tsp"}],instructions:"Pour all of the ingredients into a shaker, shake with ice and strain into the glass.",note:"This rich and warming drink tastes largely of rum, but with a hint of brandy."},
  {id:"p085",name:"Beachcomber",category:"The Rum Base",page:364,alcoholRating:2,starRating:3,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Triple sec",amount:"½ oz / 14 ml"},{name:"Sour mix",amount:"1 oz / 28 ml"},{name:"Grenadine",amount:"½ oz / 14 ml"}],instructions:"Shake all of the ingredients together with ice, and strain into a sugar-rimmed glass. Put a loose lime twist inside to garnish.",note:"This after-dinner cocktail is sweet-tasting, with a hint of sourness."},
  {id:"p086",name:"Blue Hawaiian",category:"The Rum Base",page:366,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Light rum",amount:"1 oz / 28 ml"},{name:"Coconut rum",amount:"1 oz / 28 ml"},{name:"Blue curaçao",amount:"1 oz / 28 ml"},{name:"Pineapple juice",amount:"2 oz / 56 ml"}],instructions:"Blend all the ingredients at high speed with a cup of crushed ice until smooth. Pour into the glass. Attach a slice of pineapple and a cherry to the rim.",note:"A blue version of the Piña Colada."},
  {id:"p087",name:"Torridora",category:"The Rum Base",page:367,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Light rum",amount:"1½ oz / 42 ml"},{name:"Kahlúa",amount:"½ oz / 14 ml"},{name:"Light cream",amount:"1½ tsp"},{name:"151-proof rum",amount:"1 tsp"}],instructions:"Shake the first 3 ingredients together with ice and strain into the glass. Float the 151-proof rum on top. Place 3 coffee beans on top to garnish.",note:"You can also make a Torridora Cappuccino by adding a single espresso."},
  {id:"p088",name:"Piña Colada",category:"The Rum Base",page:369,alcoholRating:3,starRating:5,glass:"Highball",ingredients:[{name:"Light rum",amount:"3 oz / 84 ml"},{name:"Coconut milk",amount:"3 tbsp"},{name:"Pineapple juice",amount:"dash"},{name:"Fresh pineapple, chopped",amount:"½ handful"}],instructions:"Blend all the ingredients at high speed with a cup of crushed ice until smooth. Pour into the glass. Garnish with a pineapple wedge and 3 pineapple leaves.",note:"Probably invented by bartender Ramón Marrero in 1954 at the Caribe Hilton Hotel in Puerto Rico."},
  {id:"p089",name:"Pineapple Fizz",category:"The Rum Base",page:370,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Light rum",amount:"2 oz / 56 ml"},{name:"Pineapple juice",amount:"1 oz / 28 ml"},{name:"Sugar",amount:"½ tsp"},{name:"Soda water",amount:"to top"}],instructions:"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Fill with soda water and stir. Drop fresh pineapple cubes into the drink.",note:"Try topping with ginger ale instead of soda water to create a spicy fizz."},
  {id:"p090",name:"Cuba Libre",category:"The Rum Base",page:371,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Havana Club or gold rum",amount:"2 oz / 56 ml"},{name:"Cola",amount:"to top"},{name:"Lime wedges",amount:"3"}],instructions:"Pour the rum into a glass filled with ice. Top with cola. Squeeze the juice of the lime wedges into the glass and stir. Drop the spent lime wedges into the drink.",note:"Legend has it that this cocktail originated in the late 19th century."},
  {id:"p091",name:"Treacle",category:"The Rum Base",page:372,alcoholRating:3,starRating:4,glass:"Rocks",ingredients:[{name:"Angostura bitters",amount:"2 dashes"},{name:"Brown sugar cube",amount:"1"},{name:"Dark rum",amount:"2 oz / 56 ml"},{name:"Apple juice",amount:"½ oz / 14 ml"}],instructions:"Drip the bitters onto the sugar cube and drop it into the glass. Add a splash of water and muddle to a paste. Add some ice and pour in the rum slowly, stirring as you do so. Add more ice, and stir again. Top with apple juice.",note:"Created by brilliant London bartender Dick Bradsell."},
  {id:"p092",name:"Nuclear Daiquiri",category:"The Rum Base",page:374,alcoholRating:4,starRating:4,glass:"Martini",ingredients:[{name:"White overproof Jamaican rum",amount:"1 oz / 28 ml"},{name:"Chartreuse (green)",amount:"1 oz / 28 ml"},{name:"Velvet falernum",amount:"½ oz / 14 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Sugar syrup",amount:"dash"}],instructions:"Pour all the ingredients into an ice-filled shaker. Shake very vigorously, and strain into the glass.",note:"A high-octane version of the classic Daiquiri. Be warned: a second Nuclear Daiquiri will inevitably be a Nuclear Daiquiri."},
  {id:"p093",name:"Spider",category:"The Rum Base",page:375,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Cola",amount:"half fill"},{name:"Choc chip ice cream",amount:"1 scoop"},{name:"Golden rum",amount:"2 oz / 56 ml"}],instructions:"Half-fill the glass with cola and add a generous scoop of ice cream. As the drink starts frothing up, add the rum. Stir gently, and garnish with grated chocolate and a straw.",note:"A feel comfort cocktail — the grown-up version of the classic cola float."},
  {id:"p094",name:"French Club",category:"The Rum Base",page:376,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"French rum",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Sugar syrup",amount:"½ oz / 14 ml"},{name:"Raspberries",amount:"5"},{name:"Egg white",amount:"½ (optional)"}],instructions:"Put all of the ingredients into an ice-filled shaker. Shake hard if using egg white, to get as much froth as possible. Strain through a tea strainer into the glass. Garnish with a raspberry.",note:"A wonderfully vibrant drink — like a Clover Club but with French-style agricole rum and lime."},
  {id:"p095",name:"White and Wrong",category:"The Rum Base",page:379,alcoholRating:3,starRating:5,glass:"Highball",ingredients:[{name:"White Jamaican rum",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Watermelon syrup",amount:"½ oz / 14 ml"},{name:"Grapefruit soda",amount:"to top"}],instructions:"Pour all of the ingredients (except the grapefruit soda) into an ice-filled glass. Top with grapefruit soda. Stir with a straw, and garnish with a slice of grapefruit.",note:"Created in Jamaica in 2006 by Paul Mant."},
  {id:"p096",name:"Dark n Stormy",category:"The Rum Base",page:378,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Lime",amount:"3 quarters"},{name:"Dark rum",amount:"2 oz / 56 ml"},{name:"Ginger beer",amount:"to top"}],instructions:"Squeeze 2 of the lime quarters into the glass, and add the rum. Add ice, and fill to the top with ginger beer. Stir once, and squeeze the last lime quarter over the top.",note:"The national drink of Bermuda, which must be made with cloudy, fiery, Jamaican-style ginger beer."},
  {id:"p097",name:"Southern Lady",category:"The Bourbon Base",page:379,alcoholRating:3,starRating:4,glass:"Highball",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Southern Comfort",amount:"1 oz / 28 ml"},{name:"Parfait amour",amount:"½ oz / 14 ml"},{name:"Pineapple juice",amount:"3 oz / 84 ml"},{name:"Sugar syrup",amount:"dash"},{name:"Soda water",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"}],instructions:"Shake the first 5 ingredients together with ice and strain into a glass half-filled with ice. Top with soda water and lime juice. Place a wedge of pineapple and a cherry on the rim.",note:"The sour lime hits the taste buds first, followed by the sweet pineapple."},
  {id:"p098",name:"Double Entendre",category:"The Bourbon Base",page:383,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Fresh apricot",amount:"1 (plus 1 for garnish)"},{name:"Brown sugar cubes",amount:"2"},{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Apricot brandy",amount:"dash"},{name:"Soda water",amount:"to top"}],instructions:"Muddle the apricot with the sugar in a shaker. Add the bourbon and the brandy, and shake with ice. Strain into a glass filled with crushed ice. Top with soda water. Garnish with sliced apricot.",note:"Created in the late 1990s by Elliot Isaacs in Bill's Bar, Tokyo."},
  {id:"p099",name:"Kentucky Colonel",category:"The Bourbon Base",page:383,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Bourbon",amount:"1½ oz / 42 ml"},{name:"Bénédictine",amount:"½ oz / 14 ml"}],instructions:"Stir the ingredients together with ice and strain into the glass. Place a lemon peel inside to garnish.",note:"Sweet, herbal Bénédictine makes a great apéritif."},
  {id:"p100",name:"Red-Hot Passion",category:"The Bourbon Base",page:384,alcoholRating:3,starRating:3,glass:"Highball",ingredients:[{name:"Bourbon",amount:"½ oz / 14 ml"},{name:"Amaretto",amount:"½ oz / 14 ml"},{name:"Southern Comfort",amount:"½ oz / 14 ml"},{name:"Sloe gin",amount:"¼ oz / 7 ml"},{name:"Triple sec",amount:"splash"},{name:"Grenadine",amount:"splash"},{name:"Orange juice",amount:"splash"},{name:"Pineapple juice",amount:"splash"}],instructions:"Pour all of the ingredients into a glass filled with ice. Stir gently. Place an orange wheel and 2 fresh cherries on the rim.",note:"Although this sweet mix contains fruit juice, it is a rich and strong-tasting cocktail."},
  {id:"p101",name:"Pulling Bear",category:"The Bourbon Base",page:387,alcoholRating:2,starRating:3,glass:"Martini",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Triple sec",amount:"¾ oz / 21 ml"},{name:"Apricot brandy",amount:"1 tbsp"},{name:"Lime juice",amount:"juice of ½ lime"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Place a peel of orange inside to garnish.",note:"The bourbon and triple sec combine to create a sweet orange flavour."},
  {id:"p102",name:"Mint Julep Southern Style",category:"The Bourbon Base",page:388,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Sugar",amount:"2 tsp"},{name:"Cold water",amount:"2 tsp"},{name:"Bourbon",amount:"2½ oz / 70 ml"}],instructions:"Pour the sugar and the water into the glass. Stir until the sugar is dissolved. Pour in the bourbon and add 2 ice cubes. Stir, adding more ice until the glass is filled. Place 5 or 6 sprigs of mint on top. Serve with a straw.",note:"The mint is used for aroma rather than taste in this shorter and stronger variation on the classic Mint Julep."},
  {id:"p103",name:"Jocose Julep",category:"The Bourbon Base",page:391,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Crème de menthe (green)",amount:"¼ oz / 7 ml"},{name:"Lime juice",amount:"1 oz / 28 ml"},{name:"Sugar syrup",amount:"1 tsp"},{name:"Mint leaves, chopped",amount:"5"},{name:"Soda water",amount:"to top"}],instructions:"Blend the ingredients (except for the soda water). Pour into a glass filled with ice and top with soda water. Place a sprig of mint inside to decorate.",note:"On serving, this cocktail will have a frothy opaque-green head."},
  {id:"p104",name:"Coffee Old-Fashioned",category:"The Bourbon Base",page:392,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"1½ oz / 42 ml"},{name:"Crème de cacao (brown)",amount:"½ oz / 14 ml"},{name:"Single espresso (hot)",amount:"1"},{name:"Cold water",amount:"¼ cup"},{name:"Sugar",amount:"2 tsp"}],instructions:"Shake all of the ingredients together with ice and strain into an ice-filled glass. Sprinkle freshly ground coffee granules on top to garnish.",note:"For a frothy, citrus-flavoured version, add a dash of orange bitters before shaking."},
  {id:"p105",name:"Allegheny",category:"The Bourbon Base",page:394,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Bourbon",amount:"1 oz / 28 ml"},{name:"Dry vermouth",amount:"1 oz / 28 ml"},{name:"Crème de mûre",amount:"¾ tsp"},{name:"Lemon juice",amount:"¾ tsp"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Place a lemon peel inside to garnish.",note:"Bourbon works well with all fruit flavours."},
  {id:"p106",name:"Mint Julep",category:"The Bourbon Base",page:397,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Mint sprigs",amount:"4 (plus 1 for garnish)"},{name:"Sugar",amount:"1 tsp"},{name:"Cold water",amount:"2 tsp"},{name:"Bourbon",amount:"2½ oz / 70 ml"}],instructions:"Muddle the mint together with the sugar and water in a highball glass. Fill with crushed ice and pour in the bourbon. Slowly stir, adding more ice until the glass is filled. Garnish with a sprig of mint.",note:"For the ultimate thirst-quencher, chill the mixed cocktail in the refrigerator for 30 minutes before serving."},
  {id:"p107",name:"Louisville Cooler",category:"The Bourbon Base",page:399,alcoholRating:1,starRating:2,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"1½ oz / 42 ml"},{name:"Orange juice",amount:"1 oz / 28 ml"},{name:"Lime juice",amount:"1 tbsp"},{name:"Sugar",amount:"1 tsp"}],instructions:"Shake all the ingredients together with ice and strain into an ice-filled glass. Place a slice of orange inside to garnish.",note:"A favourite among the local jazz musicians of Louisville."},
  {id:"p108",name:"Southern Belle",category:"The Bourbon Base",page:401,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Bourbon",amount:"1¼ oz / 35 ml"},{name:"Triple sec",amount:"¾ oz / 21 ml"},{name:"Pineapple juice",amount:"8 oz / 224 ml"},{name:"Orange juice",amount:"2 oz / 56 ml"},{name:"Fresh pineapple, chopped",amount:"1 slice"},{name:"Grenadine",amount:"splash"}],instructions:"Shake all of the ingredients (except for the grenadine) vigorously with ice. Strain into an ice-filled glass and pour in the grenadine.",note:"The grenadine sinks down to the bottom of the drink to give a beautiful sunset effect."},
  {id:"p109",name:"Bourbon Cobbler",category:"The Bourbon Base",page:403,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"2½ oz / 70 ml"},{name:"Lemon juice",amount:"1 tbsp"},{name:"Grapefruit juice",amount:"2 tsp"},{name:"Orgeat syrup",amount:"½ tsp"}],instructions:"Shake all the ingredients together with ice and strain into an ice-filled glass. Place a wedge of peach inside the drink to garnish.",note:"You can substitute the orgeat syrup with almond extract, which has a stronger flavour."},
  {id:"p110",name:"Magnolia",category:"The Bourbon Base",page:404,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"1¼ oz / 35 ml"},{name:"Grand Marnier",amount:"1¼ oz / 35 ml"},{name:"Sugar syrup",amount:"splash"},{name:"Soda water",amount:"splash"}],instructions:"Shake all the ingredients (except for the soda water) together with ice. Strain into an ice-filled glass and top with soda. Place a loose orange twist inside to garnish.",note:"This sweet orange-flavoured cocktail is one of my favourite ways to start an evening."},
  {id:"p111",name:"Sawichi",category:"The Bourbon Base",page:406,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Crème de cacao (brown)",amount:"dash"},{name:"Frangelico",amount:"dash"},{name:"Lime",amount:"½"}],instructions:"Pour the first 3 ingredients into a glass filled with ice. Stir. Squeeze the lime over the drink and drop in the spent lime to garnish.",note:"The sour lime cuts through the nutty, chocolate flavour, to create a more modern-tasting drink."},
  {id:"p112",name:"Rasping Red",category:"The Bourbon Base",page:407,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Fresh raspberries",amount:"6 oz / 170 g"},{name:"Bourbon",amount:"1½ oz / 42 ml"},{name:"Lemon juice",amount:"½ oz / 14 ml"},{name:"Raspberry purée",amount:"½ oz / 14 ml"},{name:"Sugar syrup",amount:"dash"}],instructions:"Muddle the raspberries in a shaker. Pour in the remaining ingredients. Shake with ice and strain into a glass filled with crushed ice. Garnish with a loose lemon twist and drop in 2 raspberries.",note:"This drink should be a beautiful burgundy colour."},
  {id:"p113",name:"Tennessee Fizz",category:"The Bourbon Base",page:408,alcoholRating:1,starRating:5,glass:"Flute",ingredients:[{name:"Bourbon",amount:"¼ oz / 7 ml"},{name:"Angostura bitters",amount:"1-2 dashes"},{name:"Sugar",amount:"½ tsp"},{name:"Champagne",amount:"to top"}],instructions:"Shake the bourbon together with the bitters and sugar and pour into a glass filled with ice. Fill with champagne. Put 3 thin peach slices into the drink to garnish.",note:"The garnish adds a sweet flavour to this herbal, dry mix. Be sure to use a ripe peach."},
  {id:"p114",name:"Dixie",category:"The Bourbon Base",page:402,alcoholRating:1,starRating:3,glass:"Martini",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Crème de menthe (white)",amount:"¼ tsp"},{name:"Triple sec",amount:"¼ tsp"},{name:"Angostura bitters",amount:"dash"},{name:"Sugar",amount:"⅛ tsp"}],instructions:"Shake all the ingredients together with ice and strain into the glass. Place a mint leaf inside to garnish.",note:"If you're not wild about crème de menthe, you can use fresh mint leaves and a dash of sugar syrup instead."},
  {id:"p115",name:"Lonely Hearts",category:"The Bourbon Base",page:411,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Bourbon",amount:"1½ oz / 42 ml"},{name:"Apricot brandy",amount:"1½ tsp"},{name:"Angostura bitters",amount:"dash"},{name:"Grapefruit juice",amount:"1 tbsp"},{name:"Lemon juice",amount:"1½ tsp"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. To garnish, make a cut in a slice of grapefruit and twist to sit it on the rim.",note:"This is a sweet-and-sour cocktail with a tangy edge."},
  {id:"p116",name:"Brighton Punch",category:"The Bourbon Base",page:412,alcoholRating:1,starRating:3,glass:"Highball",ingredients:[{name:"Bourbon",amount:"1 oz / 28 ml"},{name:"Bénédictine",amount:"¼ oz / 7 ml"},{name:"Brandy",amount:"¼ oz / 7 ml"},{name:"Orange juice",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Soda water",amount:"to top"}],instructions:"Shake all ingredients (except soda) together with ice and pour into a glass three-quarters filled with crushed ice. Top with soda and stir.",note:"The Bénédictine enhances the sweet flavours of the bourbon, and the brandy adds a smooth finish."},
  {id:"p117",name:"Ward 8 Bourbon",category:"The Bourbon Base",page:415,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Bourbon",amount:"3 oz / 84 ml"},{name:"Lemon juice",amount:"1 oz / 28 ml"},{name:"Orange juice",amount:"1 oz / 28 ml"},{name:"Grenadine",amount:"3 dashes"}],instructions:"Pour the ingredients into a shaker. Shake with ice and strain into the glass.",note:"Created in 1898 in the political district of Ward Eight, Boston."},
  {id:"p118",name:"Alamo",category:"The Bourbon Base",page:416,alcoholRating:3,starRating:4,glass:"Rocks",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Kahlúa",amount:"1 oz / 28 ml"},{name:"Butterscotch schnapps",amount:"dash"}],instructions:"Pour all the ingredients into an ice-filled shaker. Stir and strain into a chilled glass. Add ice and garnish with a chocolate flake.",note:"Chocolate, butterscotch and coffee flavours are natural bedfellows for any bourbon."},
  {id:"p119",name:"Seelbach",category:"The Bourbon Base",page:417,alcoholRating:4,starRating:4,glass:"Flute",ingredients:[{name:"Bourbon",amount:"1 oz / 28 ml"},{name:"Cointreau",amount:"1 oz / 28 ml"},{name:"Angostura bitters",amount:"2 dashes"},{name:"Peychaud's bitters",amount:"2 dashes"},{name:"Champagne",amount:"to top"}],instructions:"Pour the first 4 ingredients into a flute, and top with champagne. Garnish with an orange twist.",note:"Created at the Seelbach Hotel in Louisville, Kentucky, in 1917."},
  {id:"p120",name:"Horse's Neck",category:"The Bourbon Base",page:419,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Bourbon",amount:"2 oz / 56 ml"},{name:"Lemon peel",amount:"peel of 1 lemon"},{name:"Ginger ale",amount:"to top"}],instructions:"Pour the bourbon into a tall glass filled with ice. Create a long spiral strip of lemon peel. Flex the peel into the glass, hooking the end over the lip. Top up with ginger ale.",note:"The lemon peel adds a wonderful aroma. The name comes from the stretch of citrus peel curving over the rim."},
  {id:"p121",name:"Rickety Lime",category:"Other Whiskies",page:421,alcoholRating:2,starRating:2,glass:"Highball",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Lime juice",amount:"juice of ½ lime"},{name:"Soda water",amount:"to top"}],instructions:"Pour the whiskey and lime into a glass filled with ice. Fill with soda and stir.",note:"Similar to the Irish Rickey but, using lime rather than lemon, creates a slightly cleaner and more acidic drink."},
  {id:"p122",name:"Bennett Sour",category:"Other Whiskies",page:421,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Bénédictine",amount:"½ oz / 14 ml"},{name:"Sour mix",amount:"1 oz / 28 ml"},{name:"Egg white",amount:"dash (optional)"}],instructions:"Shake all of the ingredients together with ice and strain into an ice-filled glass. Drop a slice of lemon and a cherry into the glass.",note:"The Bénédictine liqueur will give this sour a distinctive, herbal flavour."},
  {id:"p123",name:"Red Daisy",category:"Other Whiskies",page:421,alcoholRating:2,starRating:3,glass:"Rocks",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Grenadine",amount:"1 tsp"},{name:"Sugar",amount:"½ tsp"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Add an ice cube. Place a slice of lemon and a slice of orange inside to garnish.",note:"The grenadine will add a hint of sweetness to the whiskey."},
  {id:"p124",name:"Lawhill",category:"Other Whiskies",page:422,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Rye whiskey",amount:"1¾ oz / 49 ml"},{name:"Dry vermouth",amount:"½ oz / 14 ml"},{name:"Pernod",amount:"¼ tsp"},{name:"Angostura bitters",amount:"dash"},{name:"Maraschino",amount:"½ tsp"}],instructions:"Pour all the ingredients into a shaker. Stir with ice and strain into the glass.",note:"The Pernod blends well with the other flavours to form a dry drink."},
  {id:"p125",name:"Whiskey Smash",category:"Other Whiskies",page:424,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Mint sprigs",amount:"4"},{name:"Brown sugar cubes",amount:"2"},{name:"Soda water",amount:"1 oz / 28 ml"},{name:"Whiskey of choice",amount:"2 oz / 56 ml"}],instructions:"Muddle the mint together with the sugar and soda water in an old-fashioned glass. Pour in the whiskey. Add crushed ice and stir.",note:"This great summer cooler is a whiskey variation on the classic bourbon-based Mint Julep."},
  {id:"p126",name:"Old-Fashioned",category:"Other Whiskies",page:424,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"White sugar cubes",amount:"2"},{name:"Angostura bitters",amount:"2 dashes"},{name:"Orange peel",amount:"1"},{name:"Whiskey of choice",amount:"2 oz / 56 ml"}],instructions:"Place the sugar cubes in an old-fashioned glass and pour the bitters onto the cubes. Add the orange peel and a dash of water. Muddle the ingredients. Stir the mix and add ice. Slowly pour in the remaining whiskey, continuing to stir. Drop in a cherry to garnish.",note:"Try mixing this cocktail with bourbon for a sweeter, less herbal flavour."},
  {id:"p127",name:"John Collins",category:"Other Whiskies",page:429,alcoholRating:2,starRating:5,glass:"Highball",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar",amount:"1 tsp"},{name:"Soda water",amount:"to top"}],instructions:"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Fill with soda water and stir. Garnish with a loose orange twist, a slice of lemon and a cherry.",note:"The John Collins can also be made with bourbon."},
  {id:"p128",name:"Commodore",category:"Other Whiskies",page:430,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Orange bitters",amount:"2 dashes"},{name:"Lime or lemon juice",amount:"juice of ½ lime or ¼ lemon"},{name:"Sugar syrup",amount:"dash"}],instructions:"Shake all the ingredients with ice and strain into the glass. Place a tight orange twist inside to garnish.",note:"A sour and easy-to-make alternative to the classic Old-Fashioned."},
  {id:"p129",name:"Rory O More",category:"Other Whiskies",page:432,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Irish whiskey",amount:"2 oz / 56 ml"},{name:"Sweet vermouth",amount:"½ oz / 14 ml"},{name:"Orange bitters",amount:"dash"}],instructions:"Pour the ingredients into a shaker, stir with ice and strain into the glass. Put a peel of orange inside to garnish.",note:"You can really taste the smooth, clean taste of the Irish whiskey in this mix."},
  {id:"p130",name:"Irish Lemonade",category:"Other Whiskies",page:434,alcoholRating:2,starRating:3,glass:"Highball",ingredients:[{name:"Irish whiskey",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of 1 lemon"},{name:"Lime juice",amount:"juice of 1 lime"},{name:"Grenadine",amount:"½ tsp"},{name:"Sugar",amount:"1 tbsp"},{name:"Soda water",amount:"to top"}],instructions:"Shake the first 5 ingredients together with ice and strain into a glass filled with crushed ice. Fill with soda water and drop in a cherry to garnish.",note:"Try topping this drink with apple juice as well as soda water for a more refreshing flavour."},
  {id:"p131",name:"Irish Rickey",category:"Other Whiskies",page:437,alcoholRating:1,starRating:3,glass:"Highball",ingredients:[{name:"Irish whiskey",amount:"1½ oz / 42 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Soda water",amount:"to top"}],instructions:"Pour the whiskey and lemon juice into a glass filled with ice. Fill with soda water and stir. Place a slice of lime inside to garnish.",note:"You may wish to add a dash of sugar syrup to sweeten this sour rickey."},
  {id:"p132",name:"Irish Coffee",category:"Other Whiskies",page:438,alcoholRating:1,starRating:5,glass:"Wine",ingredients:[{name:"Irish whiskey",amount:"1½ oz / 42 ml"},{name:"Double espresso (hot)",amount:"1"},{name:"Boiling water",amount:"2 oz / 56 ml"},{name:"Sugar syrup",amount:"dash"},{name:"Heavy cream",amount:"¼ oz / 7 ml"}],instructions:"Pour the first 4 ingredients into a large wine glass with a teaspoon to prevent cracking and stir. Float the cream on top by pouring it gently over the back of the spoon. Garnish with 3 coffee beans.",note:"Variations include tequila, brandy and cream-based liqueur versions."},
  {id:"p133",name:"Tipperary",category:"Other Whiskies",page:439,alcoholRating:3,starRating:2,glass:"Martini",ingredients:[{name:"Irish whiskey",amount:"2 oz / 56 ml"},{name:"Chartreuse (green)",amount:"½ oz / 14 ml"},{name:"Sweet vermouth",amount:"¼ oz / 7 ml"}],instructions:"Pour the ingredients into a shaker. Stir with ice and strain into the glass. Drop in a cherry to garnish.",note:"This is an incredibly strong cocktail."},
  {id:"p134",name:"Irish Toad",category:"Other Whiskies",page:443,alcoholRating:2,starRating:2,glass:"Martini",ingredients:[{name:"Irish whiskey",amount:"2 oz / 56 ml"},{name:"Chartreuse (green)",amount:"1 tsp"},{name:"Crème de menthe (green)",amount:"1 tsp"}],instructions:"Pour the ingredients into a shaker. Stir with ice and strain into the glass. Place a sprig of mint inside, or drop in an olive.",note:"On drinking this cocktail you will experience a distinct minty taste, followed by a fiery sensation from the Chartreuse."},
  {id:"p135",name:"Shillelagh",category:"Other Whiskies",page:442,alcoholRating:2,starRating:4,glass:"Highball",ingredients:[{name:"Irish whiskey",amount:"2 oz / 56 ml"},{name:"Light rum",amount:"1 tbsp"},{name:"Sloe gin",amount:"1 tbsp"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar syrup",amount:"dash"},{name:"Lemonade",amount:"to top"}],instructions:"Shake all ingredients (except the lemonade) with ice and strain into an ice-filled glass. Top with lemonade. Garnish with 2 each of fresh cherries, raspberries, strawberries and slices of peach.",note:"This is an excellent whiskey punch."},
  {id:"p136",name:"Sazerac",category:"Other Whiskies",page:441,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Pernod",amount:"½ oz / 14 ml"},{name:"Angostura bitters",amount:"dash"},{name:"Sugar syrup",amount:"2 dashes"},{name:"Rye whiskey",amount:"2 oz / 56 ml"}],instructions:"Swirl the Pernod in a chilled, ice-filled glass to coat it. Discard the Pernod. Add the bitters and sugar syrup. Stir. Pour in the rye whiskey. Garnish with a peel of orange.",note:"A classic New Orleans cocktail."},
  {id:"p137",name:"Ward Eight Scotch",category:"Other Whiskies",page:445,alcoholRating:2,starRating:4,glass:"Rocks",ingredients:[{name:"Blended scotch",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Grenadine",amount:"1 tsp"},{name:"Sugar",amount:"1 tsp"}],instructions:"Shake all of the ingredients together with ice and strain into a glass filled with crushed ice. Place a slice of orange, a slice of lemon and a cherry inside to garnish.",note:"This is the scotch version of the classic bourbon-based Ward 8."},
  {id:"p138",name:"Algonquin",category:"Other Whiskies",page:447,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Blended scotch",amount:"1½ oz / 42 ml"},{name:"Dry vermouth",amount:"1 oz / 28 ml"},{name:"Pineapple juice",amount:"1 oz / 28 ml"}],instructions:"Pour the ingredients into a shaker, shake with ice and strain into the glass. Place a pineapple leaf inside to garnish.",note:"For a fresher and fruitier cocktail, try shaking this blend with a slice of fresh pineapple instead of the juice."},
  {id:"p139",name:"Whisky Sour",category:"Other Whiskies",page:448,alcoholRating:2,starRating:5,glass:"Rocks",ingredients:[{name:"Blended scotch",amount:"2 oz / 56 ml"},{name:"Lemon juice",amount:"juice of ½ lemon"},{name:"Sugar",amount:"½ tsp"},{name:"Egg white",amount:"1 tsp (optional)"}],instructions:"Shake all of the ingredients with ice and strain into an ice-filled glass. Place a slice of lemon and a cherry inside to garnish.",note:"My personal favourite of all the sours. You can substitute the scotch with bourbon for a sweeter version."},
  {id:"p140",name:"Double Standard Sour",category:"Other Whiskies",page:450,alcoholRating:2,starRating:2,glass:"Rocks",ingredients:[{name:"Blended scotch",amount:"1 oz / 28 ml"},{name:"Gin",amount:"½ oz / 14 ml"},{name:"Lime or lemon juice",amount:"juice of 1 lime or ½ lemon"},{name:"Grenadine",amount:"½ tsp"},{name:"Sugar",amount:"½ tsp"}],instructions:"Shake all of the ingredients together with ice and strain into the glass. Place a slice of lemon on the rim and drop in a cherry.",note:"Try adding half a kiwi fruit (sliced) to the ingredients before shaking."},
  {id:"p141",name:"Dry Manhattan",category:"Other Whiskies",page:452,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Dry vermouth",amount:"¾ oz / 21 ml"},{name:"Angostura bitters",amount:"2 drops"}],instructions:"Pour the ingredients into a shaker, stir with ice until the shaker is frosted and strain into the glass. Place a lemon peel inside to garnish.",note:"My personal favourite of the Manhattan variations — its drier flavour goes perfectly with a cigar."},
  {id:"p142",name:"Perfect Manhattan",category:"Other Whiskies",page:453,alcoholRating:2,starRating:4,glass:"Martini",ingredients:[{name:"Whiskey of choice",amount:"1½ oz / 42 ml"},{name:"Dry vermouth",amount:"¼ oz / 7 ml"},{name:"Sweet vermouth",amount:"¼ oz / 7 ml"},{name:"Angostura bitters",amount:"2 drops"}],instructions:"Pour the ingredients into a shaker, stir with ice until the shaker is frosted, and strain into the glass. Garnish with an orange peel and a cherry.",note:"This is the medium-dry version of the Manhattan."},
  {id:"p143",name:"Manhattan",category:"Other Whiskies",page:454,alcoholRating:2,starRating:5,glass:"Martini",ingredients:[{name:"Whiskey of choice",amount:"2 oz / 56 ml"},{name:"Sweet vermouth",amount:"¼ oz / 7 ml"},{name:"Angostura bitters",amount:"2 drops"}],instructions:"Pour the ingredients into a shaker, stir with ice until the shaker is frosted, and strain into the glass. Garnish with an orange peel and a cherry.",note:"A true classic."},
