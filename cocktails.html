    const { useState, useMemo } = React;

const JSON_COCKTAILS = [{"id":"001","name":"Watermelon Martini","category":"The Vodka Base","page":37,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Watermelon","amount":"1 slice (large)"},{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Slice the watermelon flesh away from the rind. Discard the pips. Muddle the flesh in a shaker. Pour the vodka and sugar syrup into the shaker; shake all the ingredients together with ice and strain into a glass. To garnish, place a wedge of watermelon inside the glass.","note":"Made right, this refreshing drink is my personal favourite. Strain every drop of watermelon into the glass. This mix also makes a great shot."},{"id":"002","name":"Black Russian","category":"The Vodka Base","page":38,"glass":"Rocks","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Kahlúa","amount":"¾ oz / 21 ml"},{"name":"Cola","amount":"to top"}],"instructions":"Pour the first 3 ingredients into a glass filled with ice. Top with cola.","note":"A popular and definitive cocktail, this drink was served originally without the cola."},{"id":"003","name":"White Russian","category":"The Vodka Base","page":40,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Kahlúa","amount":"1 oz / 28 ml"},{"name":"Milk or light cream","amount":"to top"}],"instructions":"Shake the ingredients together with ice and strain into an ice-filled glass. Use sprinkles of cocoa powder or chocolate flakes to garnish.","note":"A timeless cocktail and sister drink to the Black Russian. Try both milk and cream to give the drink a smoother taste."},{"id":"004","name":"Jericho's Breeze","category":"The Vodka Base","page":41,"glass":"Rocks","alcoholRating":1,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Blue curaçao","amount":"¾ oz / 21 ml"},{"name":"Sour mix","amount":"2½ oz / 70 ml"},{"name":"Lime juice","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"splash"},{"name":"Sugar syrup","amount":"dash"},{"name":"Lemonade","amount":"splash"}],"instructions":"Pour all of the ingredients (except for the lemonade) into a shaker; shake and strain into a glass filled with crushed ice. Top with lemonade. Place a pineapple slice and a cherry inside the glass to garnish.","note":"The combination of non-alcoholic ingredients makes this cocktail taste less alcoholic than it is."},{"id":"005","name":"French Martini","category":"The Vodka Base","page":43,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Chambord","amount":"¼ oz / 7 ml"},{"name":"Pineapple juice","amount":"1½ oz / 42 ml"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. To garnish, place a pineapple leaf inside the glass.","note":"This cocktail was created in Harry's New York Bar, Paris. The mix of Chambord and pineapple produces a sweet, easy-to-drink martini."},{"id":"006","name":"Blue Lagoon","category":"The Vodka Base","page":null,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Blue curaçao","amount":"1 oz / 28 ml"},{"name":"Lemonade","amount":"to top"}],"instructions":"Pour the vodka and blue curaçao into a glass filled with ice. Top with lemonade and stir.","note":""},{"id":"007","name":"Caribbean Cruise","category":"The Vodka Base","page":null,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Blue curaçao","amount":"1 oz / 28 ml"},{"name":"Pineapple juice","amount":"to top"}],"instructions":"Pour the vodka and blue curaçao into a glass filled with ice. Top with pineapple juice and stir.","note":""},{"id":"008","name":"Vodka Martini (dry)","category":"The Vodka Base","page":null,"glass":"Martini","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"}],"instructions":"Stir ingredients with ice and strain into a chilled martini glass. Garnish with a lemon twist or olive.","note":"About the Vodka Martini: originated as a gin cocktail but vodka has become the dominant version."},{"id":"009","name":"Vodka Sour","category":"The Vodka Base","page":null,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"1 oz / 28 ml"},{"name":"Sugar syrup","amount":"½ tsp"},{"name":"Egg white","amount":"3 drops (optional)"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Garnish with a cherry and a slice of lemon.","note":"It is generally considered better to use freshly squeezed lemon juice rather than a mixer."},{"id":"013","name":"Long Grape","category":"The Vodka Base","page":null,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Seedless green grapes","amount":"8 (plus 3 for garnish)"},{"name":"Blackcurrant vodka","amount":"3 oz / 84 ml"},{"name":"Dash sugar syrup","amount":"dash"},{"name":"Lemonade","amount":"to top"}],"instructions":"Muddle the grapes in a shaker. Pour in the vodka and the sugar. Shake with ice and strain the mix into an ice-filled glass. Top with lemonade. Drop 3 grapes (halved) into the glass to garnish.","note":"This was one of the first cocktails to use flavoured vodka. If you can't find blackcurrant vodka, you can use regular vodka with a dash of blackcurrant syrup."},{"id":"014","name":"Sino-Soviet Split","category":"The Vodka Base","page":null,"glass":"Rocks","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Amaretto","amount":"1 oz / 28 ml"},{"name":"Milk or light (single) cream","amount":"dash"}],"instructions":"Pour all of the ingredients into a glass filled with ice.","note":"Try this one with a scoop of blended vanilla ice cream instead of the milk or cream."},{"id":"015","name":"Purple Passion Tea","category":"The Vodka Base","page":null,"glass":"Tall","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Passion fruit (peeled)","amount":"1"},{"name":"Vodka","amount":"¼ oz / 7 ml"},{"name":"Gin","amount":"¼ oz / 7 ml"},{"name":"Light rum","amount":"¼ oz / 7 ml"},{"name":"Chambord","amount":"½ oz / 14 ml"},{"name":"Sour mix","amount":"4 oz / 112 ml"},{"name":"Lime juice","amount":"¼ oz / 7 ml"},{"name":"Lemonade","amount":"3 oz / 84 ml"}],"instructions":"Muddle the passion fruit in a shaker. Add the remaining ingredients (except for the lemonade). Shake with ice and pour into a glass. Top with lemonade.","note":"This mix is a less alcoholic version of the original Long Island Iced Tea."},{"id":"016","name":"Woo Woo","category":"The Vodka Base","page":null,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Peach schnapps","amount":"¾ oz / 21 ml"},{"name":"Cranberry juice","amount":"to top"}],"instructions":"Pour the ingredients into a glass filled with ice. Stir. Put 4 lime wedges inside the glass to garnish.","note":"This simple mix is a drier alternative to a Sex on the Beach."},{"id":"017","name":"Paradise Martini","category":"The Vodka Base","page":64,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vanilla vodka","amount":"2 oz / 56 ml"},{"name":"Strawberry purée","amount":"1 oz / 28 ml"},{"name":"Coconut milk","amount":"½ oz / 14 ml"},{"name":"Orgeat syrup","amount":"¼ oz / 7 ml"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Pour all of the ingredients into a shaker, shake with ice and strain into the glass. Place a whole strawberry on the rim of the glass to garnish.","note":"This mix was created by Ben Pundle of the Sanderson Hotel, London. Vanilla vodka is relatively new on the market — if you can't find any, you can use vanilla-infused vodka."},{"id":"018","name":"'Cisco Bay","category":"The Vodka Base","page":65,"glass":"Tall","alcoholRating":1,"starRating":2,"ingredients":[{"name":"Citrus vodka","amount":"1½ oz / 42 ml"},{"name":"Sour mix","amount":"4 oz / 112 ml"},{"name":"Cranberry juice","amount":"splash"},{"name":"Orange juice","amount":"splash"},{"name":"Lemonade","amount":"splash"}],"instructions":"Pour the vodka, sour mix and cranberry juice into a shaker, shake with ice and strain into an ice-filled glass. Top with orange juice and lemonade. Place a slice of lemon inside the glass to garnish.","note":"The sourness of this mix creates a fine pre-dinner drink."},{"id":"019","name":"Headless Horseman","category":"The Vodka Base","page":66,"glass":"Tall","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Angostura bitters","amount":"3 dashes"},{"name":"Ginger ale","amount":"to top"}],"instructions":"Pour the vodka and the bitters into a glass filled with ice and top with ginger ale. Place a slice of orange inside the glass to garnish.","note":"The Angostura bitters add a herbal flavour to this refreshing drink."},{"id":"020","name":"Vodka Gimlet","category":"The Vodka Base","page":69,"glass":"Martini/Rocks","alcoholRating":1,"starRating":5,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Lime cordial","amount":"1 oz / 28 ml"},{"name":"Superfine (caster) sugar","amount":"1 tsp (optional)"}],"instructions":"Shake all the ingredients together with ice and strain into a martini glass. Garnish with a tight lime twist. Alternatively, serve on the rocks in an old-fashioned glass.","note":"This is the vodka version of the gin-based Gimlet. I love the crunch of sugar served over ice — but you can use sugar syrup if you prefer a smoother texture."},{"id":"021","name":"Velvet Hammer","category":"The Vodka Base","page":70,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Crème de cacao (white)","amount":"1 tbsp"},{"name":"Light (single) cream","amount":"1 tbsp"}],"instructions":"Pour all of the ingredients into a shaker, shake with ice and strain into the glass. Garnish with sprinkles of cocoa powder.","note":"Although many after-dinner drinks are made with cream, there's something to be said for making them the first drink of the evening — to line the stomach, of course."},{"id":"022","name":"Velvet Peach Hammer","category":"The Vodka Base","page":71,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1¼ oz / 49 ml"},{"name":"Peach schnapps","amount":"¾ oz / 21 ml"},{"name":"Sour mix","amount":"splash"}],"instructions":"Stir all the ingredients together with ice and strain into an ice-filled glass. Place a slice of peach inside the drink to garnish.","note":"This drink also makes a great shot — add an extra 1 oz/28 ml vodka, shake, and strain into a shot glass."},{"id":"023","name":"Cosmopolitan","category":"The Vodka Base","page":73,"glass":"Martini","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Citrus vodka","amount":"2 oz / 56 ml"},{"name":"Triple sec","amount":"1 oz / 28 ml"},{"name":"Cranberry juice","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"dash"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Garnish with a flamed ribbon of orange peel.","note":"Flaming the orange peel to release the oils of the fruit will enhance the citrus flavour of this drink. The Cosmopolitan was originally made with unflavoured vodka and garnished with a lime wedge."},{"id":"024","name":"Moscow Mule","category":"The Vodka Base","page":75,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Lime wedges (halved)","amount":"2"},{"name":"Fresh ginger slices","amount":"2"},{"name":"Sugar (white, granulated)","amount":"1 tsp"},{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Ginger beer","amount":"to top"}],"instructions":"Muddle the lime together with the ginger and the sugar in a shaker. Pour in the vodka and ginger beer. Shake with ice and strain into an ice-filled glass. Garnish with lime wedges and shredded ginger.","note":"Origins lie at the Cock 'n' Bull saloon on Hollywood's Sunset Strip in the 1940s. Traditionally served in a copper mug."},{"id":"025","name":"Banana Extravaganza","category":"The Vodka Base","page":78,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Light rum","amount":"½ oz / 14 ml"},{"name":"Crème de banane","amount":"½ oz / 14 ml"},{"name":"Cranberry juice","amount":"1 oz / 28 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"},{"name":"Pineapple juice","amount":"1 oz / 28 ml"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Place a slice of pineapple and a slice of lime inside the glass to garnish.","note":"The mix of vodka and rum gives this non-cream cocktail quite a kick."},{"id":"026","name":"Madras","category":"The Vodka Base","page":79,"glass":"Tall","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Cranberry juice","amount":"4 oz / 112 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"}],"instructions":"Shake the ingredients together with ice and strain into an ice-filled glass. Place a lime wedge inside the glass to garnish.","note":"This mix of cranberry and orange creates a simple and timeless cocktail."},{"id":"027","name":"Madraski","category":"The Vodka Base","page":81,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Kiwi fruit (peeled)","amount":"1"},{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Cranberry juice","amount":"2 oz / 56 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"}],"instructions":"Muddle the kiwi in a shaker and pour in the vodka, cranberry and orange. Shake all the ingredients together with ice and strain into an ice-filled glass. Place a peeled slice of kiwi on the rim of the glass to garnish.","note":"The addition of kiwi makes this cocktail a fresh-fruit version of the Madras."},{"id":"028","name":"English Tea","category":"The Vodka Base","page":82,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Earl Grey tea (cold)","amount":"6 oz / 168 ml"},{"name":"Lemon juice","amount":"1 oz / 28 ml"},{"name":"Sugar syrup","amount":"dash"},{"name":"Mint leaves","amount":"2"}],"instructions":"Shake all the ingredients together with ice. Strain the mix into an ice-filled glass. To garnish, put a lemon twist inside the glass and a sprig of mint on top of the ice.","note":"The Earl Grey tea gives this drink a particularly delicate and fragrant flavour. However, you can use ordinary tea if you prefer."},{"id":"029","name":"Cappuccino Cocktail","category":"The Vodka Base","page":84,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"¾ oz / 21 ml"},{"name":"Kahlúa","amount":"¾ oz / 21 ml"},{"name":"Espresso (hot)","amount":"a single"},{"name":"Light (single) cream","amount":"¾ oz / 21 ml"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Pour all of the ingredients into a shaker, shake and strain into a martini glass. Use sprinkles of cocoa powder or chocolate flakes to garnish.","note":"The best way to be woken up — well, almost! This cocktail also makes a good shot, but be warned, too many may cause a caffeine overload."},{"id":"030","name":"Vodka Grasshopper","category":"The Vodka Base","page":87,"glass":"Rocks","alcoholRating":2,"starRating":1,"ingredients":[{"name":"Vodka","amount":"¾ oz / 21 ml"},{"name":"Crème de cacao (white)","amount":"¾ oz / 21 ml"},{"name":"Crème de menthe (green)","amount":"¾ oz / 21 ml"}],"instructions":"Shake the ingredients together with ice and strain into a glass filled with crushed ice. Put a sprig of mint inside the glass to garnish.","note":"I'm not a lover of crème de menthe — but if you are, you'll enjoy this one."},{"id":"031","name":"Bloody Mary","category":"The Vodka Base","page":89,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Tomato juice","amount":"4 oz / 112 ml"},{"name":"Horseradish","amount":"½ tsp"},{"name":"Worcestershire sauce","amount":"½ tsp"},{"name":"Tabasco sauce","amount":"2 or 3 drops"},{"name":"Lemon juice","amount":"dash"},{"name":"Salt and pepper","amount":"to taste"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Garnish with a slice of lemon or a stick of celery and cracked black pepper.","note":""},{"id":"032","name":"Bloody Mary No. 2","category":"The Vodka Base","page":90,"glass":"Tall","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Red wine","amount":"dash"},{"name":"Tomato juice","amount":"4 oz / 112 ml"},{"name":"Horseradish","amount":"½ tsp"},{"name":"Worcestershire sauce","amount":"½ tsp"},{"name":"Tabasco sauce","amount":"2 or 3 drops"},{"name":"Lemon juice","amount":"dash"},{"name":"Basil leaves","amount":"2"},{"name":"Salt and pepper","amount":"to taste"},{"name":"Dry sherry","amount":"¾ oz / 14 ml"}],"instructions":"Shake all the ingredients (except for the sherry) together with ice and strain into an ice-filled glass. Float the sherry on top. Garnish with a slice of lemon, a stick of celery, 2 bay leaves, 1 cherry tomato (halved) and cracked black pepper.","note":"Another fantastic hangover cure. Be warned — the addition of wine and sherry to make this cocktail a more powerful version of the classic Bloody Mary."},{"id":"033","name":"Lychee Martini","category":"The Vodka Base","page":93,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Lychee syrup","amount":"3 oz / 84 ml"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Shake the ingredients together with ice and strain into the glass. Garnish with 2 tinned lychees on a 3-inch/75-mm cocktail skewer.","note":"The lychee syrup comes from a tin of lychees. This was probably the most popular drink for female clients at the Sanderson Hotel, London."},{"id":"034","name":"Polynesian","category":"The Vodka Base","page":95,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Cherry brandy","amount":"¾ oz / 21 ml"},{"name":"Lime juice","amount":"juice of ½ lime"}],"instructions":"Pour all the ingredients into a shaker, shake and strain into a sugar-rimmed glass. Dangle a lime twist over the rim of the glass to garnish.","note":"These ingredients complement each other perfectly."},{"id":"035","name":"Georgia Peach","category":"The Vodka Base","page":96,"glass":"Tall","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Peach schnapps","amount":"½ oz / 14 ml"},{"name":"Grenadine","amount":"dash"},{"name":"Lemonade","amount":"to top"}],"instructions":"Pour all the ingredients (except for the lemonade) into a glass filled with ice. Top with lemonade. Put a slice of peach inside the glass to garnish.","note":"This cocktail has a deep peach taste and is designed to be sipped slowly."},{"id":"036","name":"Vodka Sling","category":"The Vodka Base","page":98,"glass":"Tall","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Put the first 3 ingredients into a glass filled with ice. Stir until the sugar has dissolved. Top with soda water and stir again. Place a slice of lemon inside the glass to garnish.","note":"Chic and simple — this is the vodka version of the Gin Sling."},{"id":"037","name":"Vodka Collins","category":"The Vodka Base","page":99,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Sugar syrup","amount":"dash"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Fill with soda water. Place a slice of lemon inside the glass to garnish.","note":"This cocktail derives from the gin-based Tom Collins."},{"id":"038","name":"L.A. Sunrise","category":"The Vodka Base","page":101,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Crème de banane","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"2 oz / 56 ml"},{"name":"Pineapple juice","amount":"2 oz / 56 ml"},{"name":"Light rum","amount":"¼ oz / 7 ml"}],"instructions":"Pour all the ingredients (except for the rum) into a glass filled with ice. Stir. Float the rum on the top. To garnish, place an orange wheel on the rim of the glass and drop a cherry into the drink.","note":"If you like banana then this is a cocktail for you. Try blending all the ingredients together for a smoother treat."},{"id":"039","name":"Harvey Wallbanger","category":"The Vodka Base","page":102,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Orange juice","amount":"4 oz / 112 ml"},{"name":"Galliano","amount":"½ oz / 14 ml"}],"instructions":"Pour the vodka and the orange juice into a glass filled with ice. Stir. Float the Galliano on top. Place a slice of orange inside the glass to garnish.","note":"Named after a '60s Manhattan surfer, Harvey, who used to celebrate surfing wins with his signature mix of vodka, orange juice and Galliano."},{"id":"040","name":"Sea Breeze","category":"The Vodka Base","page":104,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Cranberry juice","amount":"4 oz / 112 ml"},{"name":"Grapefruit juice","amount":"1 oz / 28 ml"}],"instructions":"Pour 1 oz/28 ml of the vodka and all the cranberry juice into an ice-filled glass. Pour the remaining vodka and the grapefruit juice into a shaker; shake with ice and strain into the mix. Put a lime slice inside the glass to garnish.","note":"Topping the drink with the shaken vodka and grapefruit juice will give it a lovely foamy head."},{"id":"041","name":"Citronella Cooler","category":"The Vodka Base","page":105,"glass":"Tall","alcoholRating":1,"starRating":2,"ingredients":[{"name":"Citrus vodka","amount":"1 oz / 28 ml"},{"name":"Lemonade","amount":"2 oz / 56 ml"},{"name":"Cranberry juice","amount":"1 oz / 28 ml"},{"name":"Lime juice","amount":"dash"}],"instructions":"Pour all the ingredients into a glass filled with ice and drop in a lime wedge to garnish.","note":"This cocktail tastes like a soft drink with a citrus zing."},{"id":"042","name":"Long Island Iced Tea","category":"The Vodka Base","page":107,"glass":"Tall","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Vodka","amount":"½ oz / 14 ml"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Light rum","amount":"½ oz / 14 ml"},{"name":"Tequila","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Cola","amount":"dash"}],"instructions":"Shake all the ingredients (except for the cola) together with ice and strain into an ice-filled glass. Add the cola for colour and put a lemon wheel inside the glass to garnish.","note":""},{"id":"043","name":"Naked Pretzel","category":"The Vodka Base","page":108,"glass":"Rocks","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"¾ oz / 21 ml"},{"name":"Midori","amount":"1 oz / 28 ml"},{"name":"Crème de cassis","amount":"½ oz / 14 ml"},{"name":"Pineapple juice","amount":"2 oz / 56 ml"}],"instructions":"Pour all of the ingredients into a glass filled with ice and stir. Put a pineapple slice and a pineapple leaf inside the glass to garnish.","note":"This cocktail was invented by a bartender friend of mine, but I've never been able to find out the origins of its name."},{"id":"044","name":"Bloody Bull","category":"The Vodka Base","page":111,"glass":"Tall","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Vodka","amount":"1 oz / 28 ml"},{"name":"Tomato juice","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"½ oz / 14 ml"},{"name":"Beef bouillon (cold)","amount":"2 oz / 56 ml"}],"instructions":"Pour the vodka, tomato juice and lemon juice into a glass filled with ice. Add the beef bouillon and stir. Garnish with a slice of lime.","note":"From Bloody Mary to the Bull — all you have to do is add bouillon, made up from a cube or from a can."},{"id":"045","name":"Babayaga","category":"The Vodka Base","page":112,"glass":"Rocks","alcoholRating":4,"starRating":3,"ingredients":[{"name":"Soft brown sugar","amount":"2 tsp"},{"name":"Lemon, diced","amount":"½"},{"name":"Basil leaves","amount":"6"},{"name":"Vodka","amount":"1½ oz / 42 ml"},{"name":"Rose liqueur","amount":"½ oz / 14 ml"}],"instructions":"Muddle the sugar with the lemon pieces in an old-fashioned glass. Add crushed ice and the basil leaves, and churn it all together. Add the vodka and rose liqueur, stir, and top with more crushed ice. Garnish with a leaf of basil.","note":"A babayaga is a traditional witch figure from Soviet and Eastern European folklore."},{"id":"046","name":"Long Beach Iced Tea","category":"The Vodka Base","page":113,"glass":"Tall","alcoholRating":4,"starRating":3,"ingredients":[{"name":"Vodka","amount":"½ oz / 14 ml"},{"name":"Gin","amount":"½ oz / 14 ml"},{"name":"Light rum","amount":"½ oz / 14 ml"},{"name":"Tequila","amount":"½ oz / 14 ml"},{"name":"Kahlúa","amount":"½ oz / 14 ml"},{"name":"Lime juice","amount":"juice of ½ lime"},{"name":"Cranberry juice","amount":"to top"}],"instructions":"Pour all of the ingredients (except for the cranberry juice) into a glass filled with ice. Stir. Top with cranberry juice so that the drink has a pretty pink upper layer.","note":"This is a refreshing, fruity variation on the regular Long Island Iced Tea."},{"id":"047","name":"Balalaika","category":"The Vodka Base","page":114,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Triple sec","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Shake all of the ingredients together with ice, and strain into a sugar-rimmed glass. Garnish with an orange twist.","note":"The balalaika is a traditional Russian musical instrument — so use a traditional Russian vodka, like Stolichnaya."},{"id":"048","name":"Polish Breeze","category":"The Vodka Base","page":115,"glass":"Tall","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Bison grass vodka","amount":"2 oz / 56 ml"},{"name":"Apple juice","amount":"4 oz / 112 ml"},{"name":"Cranberry juice","amount":"2 oz / 56 ml"},{"name":"Lime","amount":"¼"}],"instructions":"Pour all the ingredients into a glass filled with ice, and stir. Add a squeeze of lime and a straw.","note":"Bison grass vodka, or Zubrowka, is a fragrant Polish vodka flavoured with grass from plains where the wild bison roam."},{"id":"049","name":"Bay Breeze","category":"The Vodka Base","page":117,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Vodka","amount":"2 oz / 56 ml"},{"name":"Pineapple juice","amount":"4 oz / 112 ml"},{"name":"Cranberry juice","amount":"2 oz / 56 ml"}],"instructions":"Pour all of the ingredients into a glass filled with ice, and stir. Add a straw and a stick of pineapple to garnish.","note":"A sweeter Sea Breeze, with a touch of the tropics."},{"id":"050","name":"Pollyanna","category":"The Gin Base","page":121,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Orange slices","amount":"3"},{"name":"Pineapple slices","amount":"3"},{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Sweet vermouth","amount":"½ oz / 14 ml"},{"name":"Grenadine","amount":"½ tsp"}],"instructions":"Muddle the fruit in a shaker. Add the remaining ingredients, shake with ice and strain into the glass.","note":"Fresh fruit pieces in a cocktail are a personal favourite — they cut through the alcohol to add a distinct, fruity tang."},{"id":"051","name":"Monte Carlo Imperial Highball","category":"The Gin Base","page":121,"glass":"Tall","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Crème de menthe (white)","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake all of the ingredients (except for the champagne) together with ice, and pour the mix into the glass. Fill the glass with champagne and stir.","note":"This is one of the few highballs mixed with champagne."},{"id":"052","name":"Gin Smash","category":"The Gin Base","page":124,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Sugar cube (white)","amount":"1"},{"name":"Mint sprigs","amount":"4"},{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Soda water","amount":"1 oz / 28 ml"}],"instructions":"Muddle the sugar together with the mint in an old-fashioned glass. Add crushed ice and pour in the gin. Top with soda water and stir. Drop in a cherry, if desired.","note":"Whatever you do please don't be tempted to substitute the fresh mint with crème de menthe — it won't do the drink justice."},{"id":"053","name":"Star Daisy","category":"The Gin Base","page":127,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Applejack or calvados","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Grenadine","amount":"1 tsp"},{"name":"Superfine (caster) sugar","amount":"½ tsp"}],"instructions":"Shake all the ingredients with ice and strain into a glass. Add an ice cube. Put 2 slices of lemon and 2 slices of green apple, and even a cherry if desired, into the glass to garnish.","note":"If this drink is too strong for your palate, you can dilute it with some soda water."},{"id":"054","name":"Grand Royal Fizz","category":"The Gin Base","page":128,"glass":"Tall","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Maraschino","amount":"½ tsp"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Orange juice","amount":"juice of ½ orange"},{"name":"Light (single) cream","amount":"2 tsp"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake all the ingredients (except for the soda water) together with ice. Strain the mix into an ice-filled glass. Fill with soda water and stir.","note":"Take care not to overdo the cream — too much will take away the flavour of the drink."},{"id":"055","name":"Delmonico","category":"The Gin Base","page":129,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"¾ oz / 21 ml"},{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"},{"name":"Sweet vermouth","amount":"½ oz / 14 ml"}],"instructions":"Stir all the ingredients together with ice in a shaker. Strain the mix into a glass. Drop in a cherry to garnish.","note":"The juniper flavours of the gin are enhanced by the vermouth and sweetened by the brandy to form a refined aperitif, which I think tastes great with a cigar!"},{"id":"056","name":"Hula-Hula","category":"The Gin Base","page":130,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Orange juice","amount":"¾ oz / 21 ml"},{"name":"Superfine (caster) sugar","amount":"¼ tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass.","note":"For a sweeter option try this in a glass rimmed with sugar. As you drink, work your way around the rim of the glass, tasting the sugar before you take each sip."},{"id":"057","name":"Leave-It-To-Me","category":"The Gin Base","page":132,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Maraschino","amount":"¼ tsp"},{"name":"Lemon juice","amount":"1 tsp"},{"name":"Raspberry syrup","amount":"1 tsp"}],"instructions":"Pour all of the ingredients into a shaker. Stir with ice. Strain the mix into the glass.","note":"You can use raspberry purée instead of raspberry syrup to give this cocktail more texture."},{"id":"058","name":"Gimlet","category":"The Gin Base","page":133,"glass":"Martini/Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Lime cordial","amount":"1 oz / 28 ml"}],"instructions":"Shake the ingredients together with ice, and strain into a martini glass. Place a tight lime twist inside the glass to garnish. Alternatively, pour the ingredients into an old-fashioned glass filled with ice.","note":"The famous gin Gimlet is thought to have originated in the British Navy, taking its name from the 18th-century tool used to tap barrels."},{"id":"059","name":"Blue Devil","category":"The Gin Base","page":134,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Blue curaçao","amount":"½ tsp"},{"name":"Maraschino","amount":"1 tbsp"},{"name":"Lime or lemon juice","amount":"juice of 1 lime or ½ lemon"}],"instructions":"Shake the ingredients together with ice, and strain the mix into the glass. Drop in a maraschino cherry to garnish.","note":"The blue curaçao makes this drink go blue but, despite its name and appearance, the cocktail tastes of oranges because curaçao is an orange-flavoured liqueur."},{"id":"060","name":"English Rose","category":"The Gin Base","page":136,"glass":"Martini","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Apricot brandy","amount":"¾ oz / 21 ml"},{"name":"Dry vermouth","amount":"¾ oz / 21 ml"},{"name":"Grenadine","amount":"1 tsp"},{"name":"Lemon juice","amount":"¼ tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into a sugar-rimmed glass. Attach 2 fresh cherries to the rim of the glass for decoration.","note":"The exquisite pink tones of this cocktail are reminiscent of a beautiful English rose."},{"id":"061","name":"Flamingo","category":"The Gin Base","page":139,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Apricot brandy","amount":"½ oz / 14 ml"},{"name":"Lime juice","amount":"juice of ½ lime"},{"name":"Grenadine","amount":"1 tsp"}],"instructions":"Shake all the ingredients together with ice and strain into a glass. Dangle a loose lime twist over the rim of the glass to garnish.","note":"This is a sweet and slightly sour-tasting cocktail."},{"id":"062","name":"Tom Collins","category":"The Gin Base","page":141,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Fill with soda water and stir. Garnish with an orange slice and a cherry.","note":""},{"id":"063","name":"Western Rose","category":"The Gin Base","page":142,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Apricot brandy","amount":"½ oz / 14 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"¼ tsp"}],"instructions":"Shake all the ingredients together with ice, and strain into the glass.","note":"This cocktail is not as sweet as the English Rose as it has no grenadine in it. You can personalise the drink by substituting the apricot brandy with the liqueur of your choice."},{"id":"064","name":"Gin Martini","category":"The Gin Base","page":145,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Dry vermouth","amount":"½ oz / 14 ml"}],"instructions":"Pour the vermouth into an ice-filled shaker to coat the ice with vermouth. Strain all of the vermouth away. Pour the gin into the shaker. Stir for a few seconds to chill the gin. Strain into a chilled glass. Garnish with a curl or twist of lemon peel, and an olive if desired.","note":"Some purists argue that this is the only way to make a martini. However, although originally made with gin, the martini is now more commonly made with vodka — and personally I prefer vodka."},{"id":"065","name":"Papaya Sling","category":"The Gin Base","page":147,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Angostura bitters","amount":"dash"},{"name":"Lime juice","amount":"juice of 1 lime"},{"name":"Papaya syrup","amount":"1 tbsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake all the ingredients (except for the soda water) together with ice, and strain into a glass filled with ice. Fill with soda water and stir. To garnish, add a pineapple stick.","note":"The papaya is a sweet and bitter fruit, which gives a complementary taste when paired with gin."},{"id":"066","name":"Floradora Cooler","category":"The Gin Base","page":149,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Soda water or ginger ale","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"juice of 1 lime"},{"name":"Grenadine","amount":"1 tbsp"},{"name":"Superfine (caster) sugar","amount":"½ tsp"},{"name":"Gin","amount":"2 oz / 56 ml"}],"instructions":"Pour 1½ oz/42 ml soda water or ginger ale, the lime juice, the grenadine and the sugar into a highball glass. Stir. Fill the glass with ice and pour in the gin. Fill with the remaining soda water or ginger ale, and stir again. Place a lime wedge inside the glass to garnish.","note":"If you prefer a sweeter mix, opt for the ginger ale rather than the soda water."},{"id":"067","name":"Shady Grove","category":"The Gin Base","page":151,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Ginger ale","amount":"to top"}],"instructions":"Shake all the ingredients (except for the ginger ale) with ice. Strain the mix into an ice-filled highball glass and top with ginger ale. To garnish, place 3 slices of fresh ginger inside the glass.","note":"For a non-fizzy version, use fresh ginger instead of ginger ale; pour the first 3 ingredients into a shaker; add a stick of fresh ginger, shake with ice and strain into a martini glass."},{"id":"068","name":"Cream Fizz","category":"The Gin Base","page":152,"glass":"Tall","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Light (single) cream","amount":"1 tsp"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake all the ingredients (except for the soda water) together with ice, and pour into the glass. Top with soda water. Place a mint leaf inside the glass to garnish.","note":"Be sure to shake this one vigorously for about 30 seconds — to the point where the ice cracks."},{"id":"069","name":"Hudson Bay","category":"The Gin Base","page":154,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Cherry brandy","amount":"½ oz / 14 ml"},{"name":"151-proof rum","amount":"1½ tsp"},{"name":"Orange juice","amount":"1 tbsp"},{"name":"Lime juice","amount":"1½ tsp"}],"instructions":"Shake all the ingredients together with ice and strain into a glass.","note":"Its kick comes from the high-proof rum — more than 75% abv!"},{"id":"070","name":"Typhoon","category":"The Gin Base","page":156,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Pernod","amount":"½ oz / 14 ml"},{"name":"Lime juice","amount":"juice of ½ lime"},{"name":"Champagne","amount":"to top"}],"instructions":"Shake all of the ingredients (except for the champagne) together with ice. Strain into an ice-filled glass. Top with champagne.","note":"The Pernod can be quite overpowering and it needs the ice to defuse it."},{"id":"071","name":"Free Silver","category":"The Gin Base","page":157,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Dark rum","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"},{"name":"Milk","amount":"1 tbsp"},{"name":"Superfine (caster) sugar","amount":"½ tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake all of the ingredients (except for the soda water) together with ice, and strain into an ice-filled glass. Top with soda water.","note":"Have you heard of the comic superhero, the Silver Surfer? I always think of him when I mix this drink."},{"id":"072","name":"Parisian","category":"The Gin Base","page":158,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Dry vermouth","amount":"1 oz / 28 ml"},{"name":"Crème de cassis","amount":"¼ oz / 7 ml"}],"instructions":"Shake the ingredients together with ice, and strain into the glass.","note":"This is a delicious blackcurrant-flavoured cocktail."},{"id":"073","name":"Gin Sangaree","category":"The Gin Base","page":160,"glass":"Tall","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Superfine (caster) sugar","amount":"½ tsp"},{"name":"Water","amount":"1 tsp"},{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Soda water","amount":"dash"},{"name":"Port","amount":"½ oz / 14 ml"}],"instructions":"Put the sugar and the water into a shaker; stir until the sugar is dissolved. Add the gin and stir. Pour into an ice-filled glass. Add the soda water. Stir. Float the port on top. Garnish with nutmeg and a cinnamon stick.","note":"To create a more fruity flavour, try squeezing the juice from a wedge of orange into the drink, and then drop the wedge inside the glass — or, add a dash of passion fruit juice."},{"id":"074","name":"Hokkaido","category":"The Gin Base","page":161,"glass":"Martini","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Sake","amount":"1 oz / 28 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"}],"instructions":"Shake the ingredients with ice and strain into the glass.","note":"Sake is a Japanese rice 'wine' (although actually it is brewed like beer, using rice, water and yeast), traditionally drunk warm in cups after a meal."},{"id":"075","name":"Gin Aloha","category":"The Gin Base","page":163,"glass":"Martini","alcoholRating":3,"starRating":2,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Triple sec","amount":"1½ oz / 42 ml"},{"name":"Orange bitters","amount":"dash"},{"name":"Pineapple juice","amount":"1 tbsp"}],"instructions":"Shake all the ingredients together with ice, and strain into the glass. Garnish with a pineapple leaf.","note":"The orange bitters help to bring out the sharpness of the pineapple in this mix of gin and juice."},{"id":"076","name":"Wembley","category":"The Gin Base","page":164,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Dry vermouth","amount":"¾ oz / 21 ml"},{"name":"Apple schnapps","amount":"½ tsp"},{"name":"Apricot brandy","amount":"¼ tsp"}],"instructions":"Pour all the ingredients into a shaker; stir with ice and strain into the glass.","note":"I'm told that this was invented to celebrate the UK's FA (Football Association) soccer finals, played at Wembley stadium in London."},{"id":"077","name":"Negroni","category":"The Gin Base","page":168,"glass":"Rocks","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"¾ oz / 21 ml"},{"name":"Campari","amount":"¾ oz / 21 ml"},{"name":"Sweet or dry vermouth","amount":"¾ oz / 21 ml"},{"name":"Soda water","amount":"optional"}],"instructions":"Pour the first 3 ingredients into an old-fashioned glass filled with ice and stir. Top with soda water, if desired. Garnish with a slice of lemon and a lemon twist.","note":""},{"id":"078","name":"Tropical Special","category":"The Gin Base","page":169,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Grapefruit juice","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"1 oz / 28 ml"},{"name":"Orange juice","amount":"1 oz / 28 ml"}],"instructions":"Pour all the ingredients into a shaker; shake with ice and strain the mix into an ice-filled glass. To garnish, put 2 slices of lime, 2 slices of orange and a cherry into the drink, and mix the fruit in between the ice.","note":"Triple sec is not often used in gin-based drinks. However, in this particular mix it really helps to enhance the flavour of the orange juice."},{"id":"079","name":"Park Avenue","category":"The Gin Base","page":170,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Sweet vermouth","amount":"¾ oz / 21 ml"},{"name":"Pineapple juice","amount":"1 tbsp"}],"instructions":"Pour the ingredients into a shaker; stir with ice and strain into the glass.","note":"As an alternative, try shaking the ingredients together with ice — this will give the drink a beautiful frothy head, and it won't be as strong as the stirred version."},{"id":"080","name":"Ideal Cocktail","category":"The Gin Base","page":172,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Dry vermouth","amount":"1 oz / 28 ml"},{"name":"Maraschino","amount":"¼ tsp"},{"name":"Grapefruit or lemon juice","amount":"½ tsp"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Drop in a cherry to garnish.","note":"Grapefruit will give this cocktail a tangy bite, while lemon will give it a sour-tasting edge — it's your choice."},{"id":"081","name":"Cherry Slipper","category":"The Gin Base","page":175,"glass":"Martini","alcoholRating":3,"starRating":2,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Cherry brandy","amount":"½ oz / 14 ml"},{"name":"Madeira","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"1 tsp"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Place a twisted orange peel inside the glass to garnish.","note":"Madeira is a fortified wine produced on the island of Madeira. For an orangey version, use triple sec instead of the wine."},{"id":"082","name":"Bronx","category":"The Gin Base","page":177,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Dry vermouth","amount":"¾ oz / 21 ml"},{"name":"Sweet vermouth","amount":"¾ oz / 21 ml"},{"name":"Orange juice","amount":"1½ oz / 42 ml"}],"instructions":"Shake all of the ingredients together with ice, and strain into an ice-filled glass. Drop in a cherry to garnish.","note":"Believed to have been invented in 1906 by bartender Jonny Solon at the old Waldorf-Astoria Bar in New York. Many bartenders now claim the Bronx is the original juice-mixed cocktail."},{"id":"083","name":"Cowboy 45","category":"The Gin Base","page":178,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Mint leaves","amount":"2"},{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"½ oz"},{"name":"Superfine (caster) sugar","amount":"½ tsp"},{"name":"Champagne","amount":"to top"}],"instructions":"Muddle the mint leaves in a shaker. Add the gin, lemon juice and sugar. Shake with ice and strain into the glass. Top with champagne.","note":"If you prefer your cocktail free of mint pieces, then you can strain the mix through a tea strainer."},{"id":"084","name":"Polo Cocktail","category":"The Gin Base","page":181,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"1 tbsp"},{"name":"Orange juice","amount":"1 tbsp"}],"instructions":"Shake the ingredients together with ice and strain into the glass.","note":"This cocktail is an acquired taste — the small measures of lemon and orange add a slight sourness to the flavour of the gin."},{"id":"085","name":"Crimson Cocktail","category":"The Gin Base","page":183,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Port (sweet)","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Grenadine","amount":"1 tsp"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Put a mint leaf inside the glass to garnish.","note":"The port gives this after-dinner cocktail a sweet and strongly alcoholic flavour."},{"id":"086","name":"Morro","category":"The Gin Base","page":184,"glass":"Rocks","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Dark rum","amount":"½ oz / 14 ml"},{"name":"Lime juice","amount":"1 tbsp"},{"name":"Pineapple juice","amount":"1 tbsp"},{"name":"Superfine (caster) sugar","amount":"½ tsp"}],"instructions":"Shake all the ingredients together with ice and strain into a sugar-rimmed old-fashioned glass filled with ice.","note":"Leave this drink to stand for a few minutes before you start to drink it — this will help to bring out all its flavours."},{"id":"087","name":"Jamaica Glow","category":"The Gin Base","page":188,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Red wine","amount":"1 tbsp"},{"name":"Jamaica dark rum","amount":"1 tsp"},{"name":"Orange juice","amount":"1 tbsp"}],"instructions":"Shake all the ingredients together with ice and strain into the glass.","note":"I think this cocktail works best with a full-bodied, fruity Cabernet as it complements the rum, but you can try any good red wine."},{"id":"088","name":"Knock-Out","category":"The Gin Base","page":188,"glass":"Martini","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Gin","amount":"¾ oz / 21 ml"},{"name":"Dry vermouth","amount":"¾ oz / 21 ml"},{"name":"Anise-infused vodka","amount":"½ oz / 14 ml"},{"name":"Crème de menthe (white)","amount":"1 tsp"}],"instructions":"Pour all the ingredients into a shaker; stir with ice and strain into the glass. Drop in a cherry to garnish.","note":"To infuse your own vodka, see p.20. Alternatively, you can use the liquorice-flavoured liqueur sambuca in place of the anise-infused vodka. Beware — this cocktail definitely lives up to its name."},{"id":"089","name":"Bramble","category":"The Gin Base","page":191,"glass":"Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Sugar syrup","amount":"½ oz / 14 ml"},{"name":"Crème de mûre","amount":"½ oz / 14 ml"}],"instructions":"Fill the glass with crushed ice. Pour in the first 3 ingredients. Stir. If necessary, add more crushed ice to fill the glass, and lace the drink with the crème de mûre. Garnish with 2 blackberries, and a lemon slice if desired.","note":"Invented in the mid-1980s by legendary British bartender Dick Bradsell at Fred's Bar in London's Soho. A truly modern classic."},{"id":"090","name":"Gin Alexander","category":"The Gin Base","page":193,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Crème de cacao (white)","amount":"1 oz / 28 ml"},{"name":"Light (single) cream","amount":"1 oz / 28 ml"}],"instructions":"Shake the ingredients together with ice and strain into the glass. To garnish, sprinkle nutmeg on the top of the drink.","note":"Believe it or not, the garnish is the most flavoursome ingredient in this mix. You may want to add a dash of sugar syrup to sweeten."},{"id":"091","name":"Harlem","category":"The Gin Base","page":194,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Maraschino","amount":"½ tsp"},{"name":"Pineapple juice","amount":"¾ oz / 21 ml"}],"instructions":"Shake the ingredients with ice and strain into the glass. Garnish with a pineapple slice, or wedge, on the rim of the glass.","note":"Using maraschino is a good way of mixing gin with fruit juices, as the maraschino enhances the flavour of the juice."},{"id":"092","name":"Belmont","category":"The Gin Base","page":196,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Light (single) cream","amount":"¾ oz / 21 ml"},{"name":"Raspberry purée","amount":"1 tsp"}],"instructions":"Shake the ingredients together with ice and strain into the glass. Drop 2 fresh raspberries into the drink to garnish.","note":"Delicious — raspberries and cream. You can use frozen purée — however, the drink will taste fresher and much better if you make the purée yourself."},{"id":"093","name":"Jockey Club","category":"The Gin Base","page":199,"glass":"Martini","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Crème de cacao (white)","amount":"¼ tsp"},{"name":"Angostura bitters","amount":"dash"},{"name":"Lemon juice","amount":"juice of ¼ lemon"}],"instructions":"Shake all the ingredients together with ice, and strain into the glass.","note":"Cacao and lemon may seem a surprising combination, but they complement each other in this gin mix. The different flavours hit the taste buds separately — first the chocolate, then the gin, finishing with a lemon aftertaste."},{"id":"094","name":"Singapore Sling","category":"The Gin Base","page":201,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Powdered (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"},{"name":"Cherry brandy","amount":"½ oz / 14 ml"}],"instructions":"Pour the gin, lemon and sugar into a glass filled with ice. Stir. Add the soda water, leaving just enough room to float the cherry brandy on top. To garnish, place a lemon wheel inside the glass, and drop in a cherry if desired.","note":"Invented by Ngiam Tong Boon, a bartender at the Long Bar in Singapore's Raffles Hotel, around 1915."},{"id":"095","name":"Gin Sling","category":"The Gin Base","page":202,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Pour the gin, lemon and sugar into a glass filled with ice. Stir until the sugar has dissolved. Top with soda water. Stir again. Drop in an orange twist to garnish.","note":"Singapore Sling? No, Gin Sling. Why? Well, it's minus the cherry brandy, which turns it into a sharper-tasting and opaque-looking drink."},{"id":"096","name":"Orange Oasis","category":"The Gin Base","page":204,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Kirsch","amount":"½ oz / 14 ml"},{"name":"Orange juice","amount":"4 oz / 112 ml"},{"name":"Ginger ale","amount":"to top"}],"instructions":"Shake the first 3 ingredients with ice and strain into an ice-filled glass. Top with ginger ale and stir. Garnish with an orange slice.","note":"This refreshing summer cocktail tastes like fizzy orange with a hint of bitter cherry."},{"id":"097","name":"Palm Beach","category":"The Gin Base","page":207,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Sweet vermouth","amount":"1½ tsp"},{"name":"Grapefruit juice","amount":"1½ tsp"}],"instructions":"Shake the ingredients together with ice and strain into the glass.","note":"Not for the sweet-toothed — although this mix contains sweet vermouth, it's a very dry and bitter cocktail."},{"id":"098","name":"Tuxedo","category":"The Gin Base","page":207,"glass":"Martini","alcoholRating":4,"starRating":5,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Dry vermouth","amount":"1½ oz / 42 ml"},{"name":"Pernod","amount":"¼ tsp"},{"name":"Maraschino","amount":"¼ tsp"},{"name":"Orange bitters","amount":"2 dashes"}],"instructions":"Pour all of the ingredients into a shaker; stir with ice and strain the mix into the glass. Drop a cherry into the glass to garnish.","note":"This cocktail also tastes good with a champagne top."},{"id":"099","name":"Kiss-in-the-Dark","category":"The Gin Base","page":208,"glass":"Martini","alcoholRating":3,"starRating":3,"ingredients":[{"name":"Gin","amount":"¾ oz / 21 ml"},{"name":"Cherry brandy","amount":"¾ oz / 21 ml"},{"name":"Dry vermouth","amount":"¾ oz / 21 ml"}],"instructions":"Pour the ingredients into a shaker; stir with ice and strain into the glass.","note":"This subtle blend of gin and cherry creates a pleasant, dry mix."},{"id":"100","name":"Gin Rickey","category":"The Gin Base","page":210,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Lime juice","amount":"juice of ½ lime"},{"name":"Soda water","amount":"to top"}],"instructions":"Pour the gin and the lime juice into a glass filled with ice. Fill with soda water. Stir. Put a lime wedge into the drink to garnish.","note":"The Gin Rickey is the original rickey drink. First made at Shoemaker's Restaurant in Washington for a congressional lobbyist named Joe Rickey in the late 19th century."},{"id":"101","name":"Merry Widow","category":"The Gin Base","page":212,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1¼ oz / 35 ml"},{"name":"Dry vermouth","amount":"1¼ oz / 35 ml"},{"name":"Bénédictine","amount":"½ tsp"},{"name":"Pernod","amount":"½ tsp"},{"name":"Orange bitters","amount":"dash"}],"instructions":"Pour all of the ingredients into a shaker; stir with ice and strain into the glass. Place a lemon peel inside the drink to garnish.","note":"Instead of using Pernod you can try infusing your own gin with anise to enhance the herb and liquorice flavours of this drink."},{"id":"102","name":"Abbey Cocktail","category":"The Gin Base","page":213,"glass":"Martini","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Orange bitters","amount":"dash"},{"name":"Orange juice","amount":"juice of ¼ orange"}],"instructions":"Shake the ingredients with ice and strain into the glass. Put a cherry inside the glass to garnish.","note":"This drink really needs the bitters to give it that extra orange zest."},{"id":"103","name":"Crystal Slipper","category":"The Gin Base","page":214,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Blue curaçao","amount":"½ oz / 14 ml"},{"name":"Orange bitters","amount":"2 dashes"}],"instructions":"Pour the ingredients into a shaker; shake with ice and strain into the glass. Place an orange twist inside the glass to garnish.","note":"A blue, orange-flavoured gin martini — quaint but simple."},{"id":"104","name":"Honolulu No. 1","category":"The Gin Base","page":216,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Gin","amount":"1½ oz / 42 ml"},{"name":"Angostura bitters","amount":"dash"},{"name":"Lemon juice","amount":"dash"},{"name":"Orange juice","amount":"dash"},{"name":"Pineapple juice","amount":"dash"},{"name":"Superfine (caster) sugar","amount":"½ tsp"}],"instructions":"Pour all the ingredients into a shaker; shake with ice and strain the mix into the glass.","note":"This mix of juices and bitters creates a refreshing blend with herbal undertones."},{"id":"105","name":"Clover Club","category":"The Gin Base","page":218,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"1 oz / 28 ml"},{"name":"Sugar syrup","amount":"½ oz / 14 ml"},{"name":"Raspberries","amount":"4"},{"name":"Egg white","amount":"½ (optional)"}],"instructions":"Shake all the ingredients together with ice and strain through a tea strainer into the glass.","note":"A classic drink from a Philadelphia supper club."},{"id":"106","name":"Martinez","category":"The Gin Base","page":219,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"1 oz / 28 ml"},{"name":"Sweet vermouth","amount":"1 oz / 28 ml"},{"name":"Maraschino","amount":"dash"},{"name":"Angostura bitters","amount":"dash"}],"instructions":"Pour all the ingredients into an ice-filled shaker. Stir vigorously and strain into a martini glass. Garnish with a lemon twist.","note":"The ancestor of the Dry Martini we have today, dating back to 1887 at least. This mix creates a sweeter and more complex aperitif."},{"id":"107","name":"Cowboy Hoof","category":"The Gin Base","page":221,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Gin","amount":"2½ oz / 70 ml"},{"name":"Mint leaves","amount":"6"},{"name":"Sugar syrup","amount":"dash"},{"name":"Orange bitters","amount":"2 dashes"}],"instructions":"Put all the ingredients into an ice-filled shaker and shake vigorously for at least 30 seconds. Strain through a tea strainer into the glass, and garnish with an orange twist.","note":"You really have to shake the mint into this drink, instead of letting it sit around the edges."},{"id":"254","name":"Fort William","category":"Other Whiskies","page":456,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Blended scotch","amount":"2 oz / 56 ml"},{"name":"Lime juice","amount":"juice of 1 lime"},{"name":"Grenadine","amount":"¼ tsp"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Put a lemon peel inside the glass to garnish.","note":"You can make this cocktail more flavoursome by substituting the grenadine with ½ tsp of apricot liqueur and ½ tsp of triple sec. This will also turn the drink an opaque-orange colour (rather than a deep red)."},{"id":"255","name":"Canadian Breeze","category":"Other Whiskies","page":457,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Canadian rye whisky","amount":"2 oz / 56 ml"},{"name":"Maraschino","amount":"½ tsp"},{"name":"Lemon juice","amount":"1 tbsp"},{"name":"Pineapple juice","amount":"1 tsp"}],"instructions":"Shake all of the ingredients together with ice and strain into an ice-filled glass. Place a pineapple stick and a cherry inside the glass to garnish.","note":"In this mix I like to use Canadian Club, which has a hazelnut flavour as it hits the tongue, followed by a mild citrus aftertaste."},{"id":"256","name":"Blue Blazer","category":"Other Whiskies","page":459,"glass":"Rocks","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Honey","amount":"1 tsp"},{"name":"Water (boiling)","amount":"2 oz / 56 ml"},{"name":"Blended scotch","amount":"2 oz / 56 ml"}],"instructions":"Use 2 stainless steel mugs with handles. Dissolve the honey with the water in one mug. Pour the scotch into the other and ignite with a match. Very carefully pour the whisky into the first mug. As the whisky burns, pour the mix back and forth from one mug to the other 3 or 4 times to produce a stream of flaming liquid. Once the flame goes out, pour the drink into an old-fashioned glass to serve.","note":"A cocktail where a bright blue flame streams between two mugs when the whisky is ignited. Rarely made today — exercise extreme caution; wear protective gloves and keep a fire extinguisher handy."},{"id":"257","name":"Uisge-a-Go-Go","category":"Other Whiskies","page":460,"glass":"Martini","alcoholRating":4,"starRating":4,"ingredients":[{"name":"Whiskey of choice","amount":"2 oz / 56 ml"},{"name":"Kahlúa","amount":"1 oz / 28 ml"},{"name":"Espresso (hot)","amount":"a single"},{"name":"Sugar syrup","amount":"dash"}],"instructions":"Pour all the ingredients into a shaker and let it stand for a few seconds to cool down. Add lots of ice and shake vigorously. Strain through a tea strainer into the glass. Drop in three coffee beans to garnish.","note":"Uisge-Beatha is a Gaelic term meaning 'Water of Life', and is the word from which whiskey is derived. The Whisky-a-Go Go was a famous nightclub."},{"id":"258","name":"Top Cat","category":"Other Whiskies","page":461,"glass":"Tall","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Mint stems (leafy)","amount":"3"},{"name":"Lime juice","amount":"1 oz / 28 ml"},{"name":"Sugar syrup","amount":"½ oz / 14 ml"},{"name":"Blended scotch","amount":"1½ oz / 42 ml"},{"name":"Sweet vermouth","amount":"1 oz / 28 ml"},{"name":"Maraschino","amount":"dash"},{"name":"Ginger ale","amount":"to top"}],"instructions":"Put the stems of mint in the glass. Add all of the other ingredients (except for the ginger ale) and stir gently. Top up with ginger ale and serve, adding a mint sprig for aroma, and a straw.","note":"This drink has many of the fine qualities of a Mojito — and works best with Lillet sweet vermouth, if you can find it."},{"id":"259","name":"Apple Brandy","category":"The Brandy Base","page":464,"glass":"Martini/Rocks","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Applejack or calvados","amount":"1½ oz / 42 ml"},{"name":"Grenadine","amount":"1 tsp"},{"name":"Lemon juice","amount":"1 tsp"}],"instructions":"Shake the ingredients together with ice and strain into the glass. Dangle a loose apple twist on the rim of the glass to garnish.","note":"To turn this cocktail into a slow-sipping drink, simply serve it over ice. Fill an old-fashioned glass with crushed ice and shake and strain the mix into the glass. Garnish as before."},{"id":"260","name":"Half Moon","category":"The Brandy Base","page":467,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Applejack or calvados","amount":"2 oz / 56 ml"},{"name":"Crème de cassis","amount":"dash"},{"name":"Lemon juice","amount":"juice of 1 lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"}],"instructions":"Pour all of the ingredients into a shaker, shake with ice and strain into an ice-filled glass. To garnish, float a slice of apple on top of the ice.","note":"The crème de cassis adds a hint of sweet blackcurrant to this cocktail. The slice of apple used as a garnish gives the impression of a crescent moon floating in a midnight sky — hence the cocktail's name."},{"id":"261","name":"Special Rough","category":"The Brandy Base","page":468,"glass":"Brandy snifter","alcoholRating":4,"starRating":3,"ingredients":[{"name":"Applejack or calvados","amount":"1½ oz / 42 ml"},{"name":"Brandy","amount":"1½ oz / 42 ml"},{"name":"Pernod","amount":"½ tsp"}],"instructions":"Pre-warm the brandy snifter. Pour the ingredients into a shaker, stir with ice and strain into the glass.","note":"To pre-warm a glass see p.26. This mix of liquorice, brandy and apple brandy creates a harsh but well-balanced drink."},{"id":"262","name":"Apple Brandy Highball","category":"The Brandy Base","page":470,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Granny Smith apple (peeled, cored and sliced)","amount":"½"},{"name":"Applejack or calvados","amount":"2 oz / 56 ml"},{"name":"Ginger ale or soda water","amount":"to top"}],"instructions":"Muddle the apple in a shaker, or use a mortar and pestle. Pour the applejack or calvados into a glass filled with ice. Add the apple. Fill with ginger ale or soda water. Place a lemon peel inside the glass to garnish, and stir.","note":"The lemon peel adds a zesty taste to this apple brandy cocktail. If you use ginger ale, you will sweeten the mix; if you use soda water you will temper the flavours."},{"id":"263","name":"A.J.","category":"The Brandy Base","page":472,"glass":"Martini","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Applejack or calvados","amount":"1½ oz / 42 ml"},{"name":"Apricot brandy","amount":"2 dashes"},{"name":"Triple sec","amount":"2 dashes"},{"name":"Grapefruit juice","amount":"1½ oz / 42 ml"},{"name":"Apple juice","amount":"dash"}],"instructions":"Shake all the ingredients together with ice and strain into the glass. Put a slice of apple inside the drink to garnish.","note":"This cocktail also tastes good when made with orange or pineapple juice instead of the grapefruit juice."},{"id":"264","name":"Apple Sour","category":"The Brandy Base","page":473,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Granny Smith apple (peeled, cored and sliced)","amount":"½"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Sour mix","amount":"1 oz / 28 ml"},{"name":"Egg white","amount":"1 tsp (optional)"}],"instructions":"Muddle the apple in a shaker. Pour in the remaining ingredients, shake with ice and strain into an ice-filled glass. Put a slice of lemon, a slice of apple and a cherry inside the glass to garnish.","note":"The fresh apple adds a tartness to this brandy sour — you may wish to add a dash of sugar syrup to sweeten."},{"id":"265","name":"Brandy Mint Julep","category":"The Brandy Base","page":475,"glass":"Tall","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Peach (peeled and pitted)","amount":"1"},{"name":"Mint sprigs","amount":"2"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Water (cold)","amount":"splash"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Peach schnapps","amount":"¼ oz / 7 ml"}],"instructions":"Muddle the peach and mint with the sugar and water in an ice-filled glass. Add the brandy and the peach schnapps and stir. Put 4 thin slices of peach and mint leaves inside the glass to garnish.","note":"This cocktail puts a refreshing peach spin on the classic bourbon-based Mint Julep."},{"id":"266","name":"Apple Brandy Rickey","category":"The Brandy Base","page":476,"glass":"Tall","alcoholRating":2,"starRating":3,"ingredients":[{"name":"Applejack or calvados","amount":"1½ oz / 42 ml"},{"name":"Lime wedges","amount":"2"},{"name":"Soda water","amount":"to top"}],"instructions":"Pour the applejack or calvados into a glass filled with ice. Squeeze the lime juice into the drink and drop the spent lime into the glass to garnish. Fill with soda water and stir.","note":"This is an apple brandy version of the original Gin Rickey. You may want to add a dash of apple juice to enhance the apple flavour and sweeten this slow-sipping cocktail."},{"id":"267","name":"Holly Blush","category":"The Brandy Base","page":477,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Granny Smith apple (peeled and cored)","amount":"¼"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Apricot brandy","amount":"dash"},{"name":"Triple sec","amount":"dash"},{"name":"Lime juice","amount":"juice of ½ lime"}],"instructions":"Muddle the apple in a shaker. Pour in the remaining ingredients, shake with ice and strain into the glass. Drop in a cherry to garnish.","note":"The combination of red and green ingredients creates a festive-looking drink, but it tastes great at any time of the year!"},{"id":"268","name":"Punch and Judy","category":"The Brandy Base","page":478,"glass":"Tall","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Sweet port","amount":"½ oz / 14 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Lemon juice","amount":"juice of 1 lemon"},{"name":"Sugar syrup","amount":"1 tsp"},{"name":"Orange juice","amount":"dash"},{"name":"Lemonade","amount":"to top"}],"instructions":"Shake all of the ingredients (except for the lemonade) together with ice and strain into an ice-filled glass. Add a slice of lemon, a slice of orange, 2 strawberries and a cinnamon stick. Top with lemonade.","note":"This is a great winter punch."},{"id":"269","name":"Brandy Alexander","category":"The Brandy Base","page":481,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Crème de cacao (white)","amount":"1 oz / 28 ml"},{"name":"Light (single) cream","amount":"1 oz / 28 ml"}],"instructions":"Shake the ingredients with ice and strain into a cocoa-rimmed glass.","note":"If you're a fan of brandy and can never resist a creamy dessert, this cocktail is perfect for you."},{"id":"270","name":"Brandy Alexander No. 2","category":"The Brandy Base","page":482,"glass":"Martini","alcoholRating":1,"starRating":4,"ingredients":[{"name":"Brandy","amount":"½ oz / 14 ml"},{"name":"Crème de cacao (brown)","amount":"½ oz / 14 ml"},{"name":"Frangelico","amount":"dash"},{"name":"Heavy (double) cream","amount":"½ oz / 14 ml"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. Place a chocolate wafer straw inside the glass to garnish.","note":"This cocktail is a nutty, less alcoholic version of the Brandy Alexander."},{"id":"271","name":"Sidecar","category":"The Brandy Base","page":485,"glass":"Martini","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Cognac","amount":"1 oz / 28 ml"},{"name":"Cointreau","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ¼ lemon"}],"instructions":"Shake all of the ingredients together with ice and strain into the glass. Garnish with a lemon wheel.","note":"Creation most commonly attributed to US bartender Harry MacElhone at Harry's Bar in Paris. Traditionally, the cognac, Cointreau and lemon are mixed in equal quantities. Great as an aperitif."},{"id":"272","name":"B & B","category":"The Brandy Base","page":487,"glass":"Brandy snifter","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Bénédictine","amount":"½ oz / 14 ml"},{"name":"Brandy","amount":"½ oz / 14 ml"}],"instructions":"Pre-warm a brandy snifter. Pour in the Bénédictine and float the brandy on top.","note":"Pre-warming the glass will help the brandy's aromas to flourish."},{"id":"273","name":"Grape Escape","category":"The Brandy Base","page":489,"glass":"Tall","alcoholRating":3,"starRating":5,"ingredients":[{"name":"Red grapes on a stalk","amount":"3"},{"name":"Seedless green grapes (plus 5 for garnish)","amount":"8"},{"name":"Sugar (white, granulated)","amount":"1½ tsp"},{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Champagne","amount":"to top"}],"instructions":"Put the red grapes (on their stalk) inside a glass filled with crushed ice. Muddle the green grapes together with the sugar and brandy in a shaker. Shake with ice and strain into the prepared glass. Top with champagne. To garnish, add the remaining 5 green grapes (halved) to the drink.","note":"I created this cocktail for the launch party of the animated movie Chicken Run (2000). The movie is based on the classic war film The Great Escape."},{"id":"274","name":"Brandy Twist","category":"The Brandy Base","page":490,"glass":"Brandy snifter","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Angostura bitters","amount":"2 dashes"},{"name":"Sugar syrup","amount":"½ tsp"}],"instructions":"Pour the ingredients into a shaker and stir with ice. Strain into a snifter filled with 4 or 5 ice cubes. Put a lemon twist inside the glass to garnish.","note":"You can turn this cocktail into a completely new drink by serving it in a flute with no ice and topping with champagne. Garnish as before."},{"id":"275","name":"Brandy Collins","category":"The Brandy Base","page":492,"glass":"Tall","alcoholRating":2,"starRating":5,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Superfine (caster) sugar","amount":"1 tsp"},{"name":"Soda water","amount":"to top"}],"instructions":"Shake the first 3 ingredients together with ice and strain into an ice-filled glass. Top with soda water and stir. Garnish with a loose twist of lemon and a loose twist of lime.","note":"This is the brandy version of the traditional gin-based Tom Collins."},{"id":"276","name":"Brandy Crusta","category":"The Brandy Base","page":494,"glass":"Martini","alcoholRating":3,"starRating":4,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Triple sec","amount":"½ oz / 14 ml"},{"name":"Angostura bitters","amount":"dash"},{"name":"Maraschino","amount":"1 tsp"},{"name":"Lemon juice","amount":"1 tsp"}],"instructions":"Place a tight lemon twist inside a sugar-rimmed glass. Pour all of the ingredients into a shaker and stir with ice. Strain the mix into the prepared glass.","note":"This cocktail is based on the winning combination of triple sec, bitters and lemon juice."},{"id":"277","name":"Black Stinger","category":"The Brandy Base","page":496,"glass":"Martini","alcoholRating":2,"starRating":4,"ingredients":[{"name":"Brandy","amount":"2 oz / 56 ml"},{"name":"Blackberries","amount":"4"},{"name":"Mint leaves","amount":"2"}],"instructions":"Shake the ingredients with ice. Strain (through a tea strainer) into the glass.","note":"You may wish to add a dash of sugar syrup to sweeten this cocktail."},{"id":"278","name":"Stirrup Cup","category":"The Brandy Base","page":499,"glass":"Rocks","alcoholRating":2,"starRating":2,"ingredients":[{"name":"Brandy","amount":"1 oz / 28 ml"},{"name":"Cherry brandy","amount":"1 oz / 28 ml"},{"name":"Lemon juice","amount":"juice of ½ lemon"},{"name":"Sugar syrup","amount":"1 tsp"}],"instructions":"Shake all the ingredients together with ice and strain into an ice-filled glass. Drop a cherry into the drink to garnish.","note":"This is a bitter and tangy cocktail designed to be sipped slowly."},{"id":"279","name":"Cherry Blossom"
