  "Espresso (hot)","Sour mix","Lime cordial",
];

// Mots-clés d'alcools/bases à exclure du bandeau ingrédients
const SPIRIT_KEYWORDS = [
  "vodka","gin","tequila","rum","bourbon","whiskey","whisky","scotch","brandy","cognac",
  "calvados","applejack","cachaça","mezcal","champagne","wine","sake","beer","guinness",
  "lager","prosecco","amaretto","kahlúa","triple sec","cointreau","grand marnier","midori",
  "chambord","schnapps","sloe gin","curaçao","cassis","cacao","menthe","banane","framboise",
  "galliano","frangelico","pernod","campari","vermouth","bitters","grenadine","maraschino",
  "bénédictine","chartreuse","drambuie","jägermeister","baileys","parfait amour","mûre",
  "southern comfort","pimm","sambuca","absinthe","falernum","dubonnet","picon","aperol",
  "liqueur","schnapps","crème de","orgeat syrup","raspberry syrup","passion fruit syrup",
  "rose liqueur","apricot brandy","cherry brandy","port","sherry","proof rum","vya",
  "strawberry liqueur","peach liqueur","coconut liqueur","apple schnapps","cinnamon schnapps",
];

const isSpirit = (name) => {
  const nl = name.toLowerCase();
  return SPIRIT_KEYWORDS.some(kw => nl.includes(kw));
};

function CocktailApp() {
  const ALL = [...JSON_COCKTAILS, ...PDF_COCKTAILS];
  const [selectedBase, setSelectedBase] = useState("All");
  const [search, setSearch] = useState("");
  const [ingredientSearch, setIngredientSearch] = useState("");
  const [selectedIngredient, setSelectedIngredient] = useState("");
  const [selected, setSelected] = useState(null);
  const [showSugg, setShowSugg] = useState(false);
  const [randomPanel, setRandomPanel] = useState(false);
  const [randomCocktails, setRandomCocktails] = useState([]);

  // Ingrédients non-alcool, triés par fréquence dans la sélection courante
  const mixerBandeau = useMemo(() => {
    const pool = selectedBase === "All" ? ALL : ALL.filter(c => c.category === selectedBase);
    const map = {};
    pool.forEach(c => c.ingredients?.forEach(i => {
      if (!isSpirit(i.name)) map[i.name] = (map[i.name]||0) + 1;
    }));
    return Object.entries(map)
      .filter(([,cnt]) => cnt >= 2)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 25)
      .map(([name, count]) => ({name, count}));
  }, [selectedBase]);

  const allIngredientNames = useMemo(() => {
    const s = new Set();
    ALL.forEach(c => c.ingredients?.forEach(i => s.add(i.name)));
    return Array.from(s).sort((a,b) => a.localeCompare(b));
  }, []);

  const suggestions = useMemo(() => {
    if (!ingredientSearch || ingredientSearch.length < 2) return [];
    const q = ingredientSearch.toLowerCase();
    return allIngredientNames.filter(i => i.toLowerCase().includes(q)).slice(0, 8);
  }, [ingredientSearch]);

  const activeIngFilter = selectedIngredient || ingredientSearch;

  const filtered = useMemo(() => {
    let list = ALL;
    if (selectedBase !== "All") list = list.filter(c => c.category === selectedBase);
    if (search.trim()) { const q = search.toLowerCase(); list = list.filter(c => c.name.toLowerCase().includes(q)); }
    if (activeIngFilter.trim()) { const q = activeIngFilter.toLowerCase(); list = list.filter(c => c.ingredients?.some(i => i.name.toLowerCase().includes(q))); }
    return list;
  }, [selectedBase, search, activeIngFilter]);

  const doRandom = () => {
    const pool = [...ALL];
    const picks = [];
    const used = new Set();
    while (picks.length < 3 && used.size < pool.length) {
      const idx = Math.floor(Math.random() * pool.length);
      if (!used.has(idx)) { used.add(idx); picks.push(pool[idx]); }
    }
    setRandomCocktails(picks);
    setRandomPanel(true);
  };

  const clearIngFilter = () => { setSelectedIngredient(""); setIngredientSearch(""); };
  const stars = n => "★".repeat(n||0) + "☆".repeat(5-(n||0));
  const pageNum = c => c.page || c.id;

  return (
    <div style={{fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:"#0d0d0d",color:"#f0f0f0"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#FF69B4 0%,#FF1493 50%,#C13584 100%)",padding:"1.25rem 1.25rem 0.85rem",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"0.75rem"}}>
          <h1 style={{margin:0,fontSize:"1.75rem",fontWeight:800,color:"#fff",textShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>🍸 Cocktail Lab</h1>
          <button onClick={doRandom} style={{
            background:"rgba(255,255,255,0.2)",border:"1.5px solid rgba(255,255,255,0.5)",
            borderRadius:"2rem",padding:"0.35rem 0.85rem",cursor:"pointer",
            color:"#fff",fontWeight:700,fontSize:"0.82rem",
            whiteSpace:"nowrap",
          }}>🎲 Aléatoire</button>
        </div>
        <p style={{margin:"0.25rem 0 0",color:"rgba(255,255,255,0.8)",fontSize:"0.85rem"}}>{ALL.length} recettes · {filtered.length} affichées</p>
      </div>

      {/* BASE SELECTOR */}
      <div style={{background:"#111",borderBottom:"1px solid #1a1a1a",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"flex",gap:"0.4rem",padding:"0.55rem 0.75rem",minWidth:"max-content"}}>
          {BASES.map(base => {
            const cfg = base==="All" ? {bg:"#FF69B4",text:"#fff"} : (BASE_COLORS[base]||{bg:"#555",text:"#fff"});
            const active = selectedBase === base;
            const label = base==="All" ? "Tous" : (BASE_LABELS[base]||base);
            const emoji = base==="All" ? "🍸" : (BASE_EMOJI[base]||"");
            const count = base==="All" ? ALL.length : ALL.filter(c=>c.category===base).length;
            return (
              <button key={base} onClick={()=>{setSelectedBase(base);clearIngFilter();}} style={{
                border:"none",borderRadius:"2rem",padding:"0.35rem 0.8rem",cursor:"pointer",
                fontWeight:active?700:500,fontSize:"0.78rem",whiteSpace:"nowrap",
                background:active?cfg.bg:"#1e1e1e",color:active?cfg.text:"#888",
                outline:active?`2px solid ${cfg.bg}`:"none",outlineOffset:"2px",
                transition:"all 0.15s",
              }}>{emoji} {label} <span style={{opacity:0.6,fontSize:"0.7rem"}}>({count})</span></button>
            );
          })}
        </div>
      </div>

      {/* INGREDIENT BANDEAU — mixers seulement, pas les alcools */}
      {mixerBandeau.length > 0 && (
        <div style={{background:"#0e0e0e",borderBottom:"1px solid #181818",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:"0.35rem",padding:"0.45rem 0.75rem",minWidth:"max-content",alignItems:"center"}}>
            {mixerBandeau.map(({name, count}) => {
              const active = selectedIngredient === name;
              return (
                <button key={name} onClick={()=>{
                  if (active) clearIngFilter();
                  else { setSelectedIngredient(name); setIngredientSearch(""); }
                }} style={{
                  border:`1px solid ${active?"#FF69B4":"#2a2a2a"}`,
                  borderRadius:"2rem",padding:"0.28rem 0.65rem",cursor:"pointer",
                  fontWeight:active?700:400,fontSize:"0.74rem",whiteSpace:"nowrap",
                  background:active?"rgba(255,105,180,0.15)":"transparent",
                  color:active?"#FF69B4":"#777",
                  transition:"all 0.12s",
                }}>{name} <span style={{opacity:0.55,fontSize:"0.67rem"}}>({count})</span></button>
              );
            })}
          </div>
        </div>
      )}

      {/* SEARCH */}
      <div style={{background:"#0f0f0f",padding:"0.55rem 0.75rem 0.45rem",display:"flex",flexDirection:"column",gap:"0.35rem"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:"0.7rem",top:"50%",transform:"translateY(-50%)",fontSize:"0.9rem",pointerEvents:"none"}}>🔍</span>
          <input value={ingredientSearch}
            onChange={e=>{setIngredientSearch(e.target.value);setSelectedIngredient("");setShowSugg(true);}}
            onFocus={()=>setShowSugg(true)}
            onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
            placeholder="Recherche par ingrédient…"
            style={{width:"100%",boxSizing:"border-box",padding:"0.6rem 2.2rem 0.6rem 2.2rem",background:"#1a1a1a",border:"2px solid #FF69B4",borderRadius:"0.65rem",color:"#fff",fontSize:"0.88rem",outline:"none"}}
          />
          {ingredientSearch && <button onClick={()=>setIngredientSearch("")} style={{position:"absolute",right:"0.7rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:"1.1rem"}}>×</button>}
          {showSugg && suggestions.length > 0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,background:"#1a1a1a",border:"1px solid #FF69B4",borderRadius:"0.5rem",marginTop:"0.15rem",boxShadow:"0 4px 20px rgba(255,105,180,0.2)",overflow:"hidden"}}>
              {suggestions.map(ing => (
                <button key={ing} onMouseDown={()=>{setIngredientSearch(ing);setSelectedIngredient("");setShowSugg(false);}}
                  style={{display:"block",width:"100%",textAlign:"left",padding:"0.45rem 0.9rem",background:"none",border:"none",borderBottom:"1px solid #222",color:"#ddd",cursor:"pointer",fontSize:"0.84rem"}}
                  onMouseOver={e=>e.currentTarget.style.background="#FF69B420"}
                  onMouseOut={e=>e.currentTarget.style.background="none"}
                >🍋 {ing}</button>
              ))}
            </div>
          )}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Chercher par nom de cocktail…"
          style={{width:"100%",boxSizing:"border-box",padding:"0.45rem 0.7rem",background:"#1a1a1a",border:"1px solid #252525",borderRadius:"0.65rem",color:"#ccc",fontSize:"0.84rem",outline:"none"}}
        />
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem",fontSize:"0.71rem",color:"#555"}}>
          <span>{filtered.length} résultat{filtered.length!==1?"s":""}</span>
          {(search||activeIngFilter) && <button onClick={()=>{setSearch("");clearIngFilter();}} style={{background:"none",border:"1px solid #333",borderRadius:"1rem",color:"#666",padding:"0.1rem 0.5rem",cursor:"pointer",fontSize:"0.69rem"}}>Effacer tout</button>}
          {activeIngFilter && <span style={{color:"#FF69B4",fontSize:"0.71rem"}}>• {activeIngFilter}</span>}
        </div>
      </div>

      {/* GRID — cartes noires avec contour coloré, nom mis en évidence */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:"0.5rem",padding:"0.5rem 0.65rem 3rem"}}>
        {filtered.map(c => {
          const cfg = BASE_COLORS[c.category] || {bg:"#555",text:"#fff"};
          return (
            <button key={c.id} onClick={()=>setSelected(c)} style={{
              background:"#151515",
              border:`1.5px solid ${cfg.bg}55`,
              borderLeft:`3.5px solid ${cfg.bg}`,
              borderRadius:"0.85rem",
              padding:"0.75rem 0.7rem 0.55rem",
              cursor:"pointer",textAlign:"left",
              transition:"all 0.12s",position:"relative",
            }}
              onMouseOver={e=>{
                e.currentTarget.style.background="#1d1d1d";
                e.currentTarget.style.borderColor=cfg.bg;
                e.currentTarget.style.transform="translateY(-2px)";
                e.currentTarget.style.boxShadow=`0 4px 16px ${cfg.bg}30`;
              }}
              onMouseOut={e=>{
                e.currentTarget.style.background="#151515";
                e.currentTarget.style.borderColor=cfg.bg+"55";
                e.currentTarget.style.borderLeftColor=cfg.bg;
                e.currentTarget.style.transform="none";
                e.currentTarget.style.boxShadow="none";
              }}
            >
              {/* Nom du cocktail — en évidence, grand et blanc */}
              <div style={{fontSize:"0.95rem",fontWeight:800,color:"#f5f5f5",lineHeight:1.2,marginBottom:"0.4rem",wordBreak:"break-word"}}>
                {c.name}
              </div>

              {/* Catégorie en couleur de base */}
              <div style={{fontSize:"0.58rem",fontWeight:600,color:cfg.bg,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"0.3rem",opacity:0.9}}>
                {BASE_EMOJI[c.category]} {BASE_LABELS[c.category]||c.category}
              </div>

              <div style={{fontSize:"0.65rem",color:"#888"}}>{stars(c.starRating)}</div>

              {/* Numéro discret en bas à droite, sans "p." */}
              <div style={{
                position:"absolute",bottom:"0.45rem",right:"0.55rem",
                fontSize:"0.65rem",fontWeight:700,
                color:cfg.bg+"66",
              }}>{pageNum(c)}</div>
            </button>
          );
        })}
        {filtered.length===0 && (
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:"3rem",color:"#444"}}>
            <div style={{fontSize:"2.5rem",marginBottom:"0.75rem"}}>🍸</div>
            <p style={{margin:0}}>Aucun cocktail trouvé</p>
          </div>
        )}
      </div>

      {/* DETAIL MODAL */}
      {selected && (
        <div onClick={e=>{if(e.target===e.currentTarget)setSelected(null);}} style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#111",borderRadius:"1.25rem 1.25rem 0 0",width:"100%",maxWidth:"580px",maxHeight:"88vh",overflowY:"auto",paddingBottom:"2rem"}}>
            {(()=>{
              const cfg = BASE_COLORS[selected.category]||{bg:"#555",text:"#fff"};
              const textSub = cfg.text==="#fff" ? "rgba(255,255,255,0.65)" : "rgba(0,0,0,0.5)";
              return (<>
                <div style={{background:cfg.bg,padding:"1.1rem 1.25rem 0.9rem",borderRadius:"1.25rem 1.25rem 0 0",position:"sticky",top:0,zIndex:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.2rem",flexWrap:"wrap"}}>
                        <span style={{fontSize:"0.62rem",fontWeight:700,color:textSub,textTransform:"uppercase",letterSpacing:"0.8px"}}>
                          {BASE_EMOJI[selected.category]} {BASE_LABELS[selected.category]||selected.category}
                        </span>
                        <span style={{
                          fontSize:"0.75rem",fontWeight:800,
                          background:"rgba(0,0,0,0.22)",color:cfg.text,
                          borderRadius:"0.35rem",padding:"0.05rem 0.45rem",
                          border:"1px solid rgba(255,255,255,0.15)",
                        }}>{pageNum(selected)}</span>
                      </div>
                      <h2 style={{margin:0,fontSize:"1.5rem",fontWeight:800,color:cfg.text,lineHeight:1.1}}>{selected.name}</h2>
                    </div>
                    <button onClick={()=>setSelected(null)} style={{background:"rgba(0,0,0,0.2)",border:"none",borderRadius:"50%",width:"1.9rem",height:"1.9rem",cursor:"pointer",color:cfg.text,fontSize:"1rem",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginLeft:"0.75rem"}}>×</button>
                  </div>
                  <div style={{display:"flex",gap:"1.2rem",marginTop:"0.55rem"}}>
                    <div><div style={{fontSize:"0.6rem",color:textSub,marginBottom:"0.1rem"}}>NOTE</div><div style={{color:"#FFD700",fontSize:"0.82rem"}}>{stars(selected.starRating)}</div></div>
                    <div><div style={{fontSize:"0.6rem",color:textSub,marginBottom:"0.1rem"}}>ALCOOL</div><div style={{fontSize:"0.72rem",color:cfg.text}}>{"●".repeat(selected.alcoholRating||0)}{"○".repeat(5-(selected.alcoholRating||0))}</div></div>
                    {selected.glass && <div><div style={{fontSize:"0.6rem",color:textSub,marginBottom:"0.1rem"}}>VERRE</div><div style={{fontSize:"0.75rem",color:cfg.text}}>{selected.glass}</div></div>}
                  </div>
                </div>
                <div style={{padding:"1.1rem 1.25rem 0"}}>
                  <div style={{fontSize:"0.68rem",fontWeight:700,color:"#FF69B4",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"0.5rem"}}>Ingrédients</div>
                  <div style={{display:"grid",gap:"0.4rem",marginBottom:"1.1rem"}}>
                    {selected.ingredients?.map((ing,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderBottom:"1px solid #1c1c1c",paddingBottom:"0.35rem"}}>
                        <span style={{color:"#e0e0e0",fontSize:"0.9rem"}}>{ing.name}</span>
                        <span style={{color:"#ADFF2F",fontSize:"0.8rem",fontWeight:600,marginLeft:"1rem",whiteSpace:"nowrap"}}>{ing.amount}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:"0.68rem",fontWeight:700,color:"#FF69B4",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"0.35rem"}}>Préparation</div>
                  <p style={{color:"#ccc",fontSize:"0.9rem",lineHeight:1.65,margin:"0 0 1.1rem"}}>{selected.instructions}</p>
                  {selected.note && (
                    <div style={{background:"#181818",borderLeft:"3px solid #FF69B4",borderRadius:"0 0.4rem 0.4rem 0",padding:"0.6rem 0.9rem",marginBottom:"1.1rem"}}>
                      <div style={{fontSize:"0.65rem",color:"#FF69B4",fontWeight:700,marginBottom:"0.15rem"}}>💡 NOTE</div>
                      <p style={{color:"#999",fontSize:"0.83rem",lineHeight:1.5,margin:0}}>{selected.note}</p>
                    </div>
                  )}
                  <div style={{fontSize:"0.65rem",color:"#444",marginBottom:"0.35rem"}}>FILTRER PAR INGRÉDIENT</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem"}}>
                    {selected.ingredients?.map((ing,i)=>(
                      <button key={i} onMouseDown={()=>{setSelectedIngredient(ing.name);setIngredientSearch("");setSelected(null);}}
                        style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"2rem",padding:"0.25rem 0.65rem",color:"#777",fontSize:"0.76rem",cursor:"pointer"}}
                        onMouseOver={e=>{e.currentTarget.style.borderColor="#FF69B4";e.currentTarget.style.color="#FF69B4";}}
                        onMouseOut={e=>{e.currentTarget.style.borderColor="#2a2a2a";e.currentTarget.style.color="#777";}}
                      >{ing.name}</button>
                    ))}
                  </div>
                </div>
              </>);
            })()}
          </div>
        </div>
      )}

      {/* RANDOM PANEL — tiroir droite */}
      {randomPanel && (
        <div onClick={e=>{if(e.target===e.currentTarget)setRandomPanel(false);}} style={{position:"fixed",inset:0,zIndex:400,background:"rgba(0,0,0,0.75)",display:"flex",justifyContent:"flex-end"}}>
          <div style={{background:"#111",width:"min(100%,380px)",height:"100%",overflowY:"auto",boxShadow:"-8px 0 32px rgba(0,0,0,0.6)"}}>
            <div style={{background:"linear-gradient(135deg,#FF69B4,#C13584)",padding:"1.25rem 1.25rem 1rem",position:"sticky",top:0,zIndex:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:"#fff",fontWeight:800,fontSize:"1.1rem"}}>🎲 Sélection Aléatoire</div>
                  <div style={{color:"rgba(255,255,255,0.75)",fontSize:"0.78rem",marginTop:"0.15rem"}}>3 cocktails choisis au hasard</div>
                </div>
                <button onClick={()=>setRandomPanel(false)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:"2rem",height:"2rem",cursor:"pointer",color:"#fff",fontSize:"1.1rem",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
              <button onClick={doRandom} style={{
                marginTop:"0.75rem",width:"100%",background:"rgba(255,255,255,0.15)",
                border:"1.5px solid rgba(255,255,255,0.35)",borderRadius:"0.75rem",
                padding:"0.55rem",cursor:"pointer",color:"#fff",fontWeight:700,fontSize:"0.85rem",
              }}>🔀 Nouvelle sélection</button>
            </div>
            <div style={{padding:"1rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
              {randomCocktails.map(c => {
                const cfg = BASE_COLORS[c.category]||{bg:"#555",text:"#fff"};
                return (
                  <div key={c.id} style={{borderRadius:"1rem",overflow:"hidden",border:`1.5px solid ${cfg.bg}55`,borderLeft:`3.5px solid ${cfg.bg}`}}>
                    <div style={{background:"#191919",padding:"0.9rem 1rem 0.7rem"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"0.58rem",fontWeight:600,color:cfg.bg,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"0.2rem"}}>
                            {BASE_EMOJI[c.category]} {BASE_LABELS[c.category]||c.category}
                          </div>
                          <div style={{fontSize:"1.05rem",fontWeight:800,color:"#f5f5f5",lineHeight:1.2}}>{c.name}</div>
                        </div>
                        <div style={{fontSize:"0.7rem",fontWeight:700,color:cfg.bg+"66",marginLeft:"0.5rem",marginTop:"0.3rem"}}>{pageNum(c)}</div>
                      </div>
                      <div style={{display:"flex",gap:"1rem",marginTop:"0.45rem"}}>
                        <div style={{fontSize:"0.68rem",color:"#888"}}>{stars(c.starRating)}</div>
                        {c.glass && <div style={{fontSize:"0.65rem",color:"#666"}}>{c.glass}</div>}
                      </div>
                    </div>
                    <div style={{background:"#141414",padding:"0.75rem 1rem"}}>
                      <div style={{fontSize:"0.62rem",color:"#FF69B4",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"0.4rem"}}>Ingrédients</div>
                      {c.ingredients?.slice(0,6).map((ing,i) => (
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"0.2rem 0",borderBottom:"1px solid #222"}}>
                          <span style={{color:"#ddd",fontSize:"0.82rem"}}>{ing.name}</span>
                          <span style={{color:"#ADFF2F",fontSize:"0.76rem",fontWeight:600,marginLeft:"0.75rem",whiteSpace:"nowrap"}}>{ing.amount}</span>
                        </div>
                      ))}
                      {(c.ingredients?.length||0) > 6 && <div style={{color:"#555",fontSize:"0.72rem",marginTop:"0.25rem"}}>+{c.ingredients.length-6} autres…</div>}
                      <button onClick={()=>{setSelected(c);setRandomPanel(false);}} style={{
                        marginTop:"0.6rem",width:"100%",background:"#1e1e1e",border:"1px solid #2a2a2a",
                        borderRadius:"0.5rem",padding:"0.4rem",cursor:"pointer",
                        color:"#FF69B4",fontSize:"0.78rem",fontWeight:600,
                      }}>Voir la recette complète →</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CocktailApp));
  </script>
</body>
</html>
